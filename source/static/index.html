                                        <div>{assignmentRequestResult.message}</div>
                                        {assignmentRequestResult.scope && (
                                            <div className="mt-3 space-y-2 text-xs leading-relaxed">
                                                {assignmentRequestResult.scope.guidance && (
                                                    <div className="font-semibold">
                                                        {assignmentRequestResult.scope.guidance}
                                                    </div>
                                                )}
                                                <div className="grid grid-cols-1 gap-2 text-slate-700">
                                                    <div>
                                                        <span className="font-semibold text-slate-800">사용자 직무:</span>{' '}
                                                        {assignmentRequestResult.scope.user_job_scope?.length
                                                            ? assignmentRequestResult.scope.user_job_scope.map(t => `${t.label}(${t.value})`).join(', ')
                                                            : '선택 없음'}
                                                    </div>
                                                    <div>
                                                        <span className="font-semibold text-slate-800">이 사건 필요 직무:</span>{' '}
                                                        {assignmentRequestResult.scope.resource_job_tags?.length
                                                            ? assignmentRequestResult.scope.resource_job_tags.map(t => `${t.label}(${t.value})`).join(', ')
                                                            : '없음'}
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {assignmentRequestData?.status === 'otp_required' && (
                                    <div className="mx-6 mb-4 bg-amber-50 border border-amber-200 rounded-lg p-4">
                                        <div className="text-sm font-semibold text-amber-900 mb-2">요청자 OTP 인증</div>
                                        <div className="flex gap-2">
                                            <input
                                                type="text"
                                                value={assignmentOtp}
                                                onChange={(e) => setAssignmentOtp(e.target.value.replace(/\D/g, '').slice(0, 6))}
                                                placeholder="6자리 OTP"
                                                className="flex-1 px-3 py-2 border border-amber-300 rounded text-sm font-mono"
                                                maxLength="6"
                                            />
                                            <button
                                                onClick={verifyAssignmentOtp}
                                                disabled={assignmentOtpLoading || assignmentOtp.length !== 6}
                                                className="px-4 py-2 rounded bg-amber-600 text-white text-sm font-semibold hover:bg-amber-700 disabled:opacity-50 disabled:cursor-not-allowed"
                                            >
                                                {assignmentOtpLoading ? '인증 중...' : 'OTP 인증'}
                                            </button>
                                        </div>
                                        <div className="text-xs text-amber-800 mt-2">
                                            토큰 기기 앱에서 표시되는 OTP를 입력하면 관리자 최종 승인 단계로 넘어갑니다.
                                        </div>
                                    </div>
                                )}

                                <div className="px-6 py-4 bg-slate-50 flex justify-end gap-3 border-t border-slate-200">
                                    <button
                                        onClick={closeAssignmentModal}
                                        className="px-4 py-2 rounded-lg bg-white border border-slate-300 text-slate-700 font-semibold hover:bg-slate-100 transition"
                                    >
                                        취소
                                    </button>
                                    <button
                                        onClick={requestCaseAssignment}
                                        disabled={assignmentRequestLoading || assignmentRequestResult?.ok}
                                        className="px-4 py-2 rounded-lg bg-red-600 text-white font-semibold hover:bg-red-700 transition disabled:opacity-50 disabled:cursor-not-allowed"
                                    >
                                        {assignmentRequestLoading ? '요청 중...' : '담당 사건 등록 요청'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ============ CASE DETAIL PAGE ============
        function CaseDetailPage({ caseId }) {
            const auth = useContext(AuthContext);
            const sim = useContext(SimulationContext);
            const [caseDetail, setCaseDetail] = useState(null);
            const [loading, setLoading] = useState(true);
            const [downloadLoading, setDownloadLoading] = useState(false);

            // 열람 모달 — decision.resource.content 를 <pre> 로 보여준다.
            const [showViewModal, setShowViewModal] = useState(false);

            // Level 3 재인증 모달
            const [showReauthModal, setShowReauthModal] = useState(false);
            const [reauthOtp, setReauthOtp] = useState('');
            const [reauthSubmitting, setReauthSubmitting] = useState(false);
            const [reauthError, setReauthError] = useState(null);

            // Phase 2 — 진짜 Break-Glass 자가발동 UI 상태
            const [bgActive, setBgActive] = useState([]);          // 내 활성 BG 목록 (전체)
            const [showBgModal, setShowBgModal] = useState(false);
            const [bgJustification, setBgJustification] = useState('');
            const [bgMfaCode, setBgMfaCode] = useState('');
            const [bgSubmitting, setBgSubmitting] = useState(false);
            const [bgError, setBgError] = useState(null);
            const [refreshCounter, setRefreshCounter] = useState(0);

            // L4 명시적 승인 요청 상태
            //  - approvalRequest: { approval_id, status, existing } | null
            //  - approvalMessage: 화면에 보여줄 안내 문구
            //  - approvalSubmitting: POST 중인지 여부
            // 자원이 바뀌면 초기화된다 (아래 useEffect).
            const [approvalRequest, setApprovalRequest] = useState(null);
            const [approvalMessage, setApprovalMessage] = useState(null);
            const [approvalSubmitting, setApprovalSubmitting] = useState(false);

            // caseId 가 바뀌면 이전 자원의 승인 요청 state 를 초기화한다.
            useEffect(() => {
                setApprovalRequest(null);
                setApprovalMessage(null);
                setApprovalSubmitting(false);
            }, [caseId]);

            useEffect(() => {
                if (!auth.token || !caseId) return;
                setLoading(true);

                const fetchAll = async () => {
                    try {
                        const [detailRes, bgRes] = await Promise.all([
                            fetch(`/api/resources/cases/${caseId}`, {
                                headers: {
                                    'Authorization': `Bearer ${auth.token}`,
                                    'X-Device-Id': encodeURIComponent(sim.deviceId),
                                    'X-Location': encodeURIComponent(sim.location),
                                    ...(sim.simHour != null && { 'X-Sim-Hour': String(sim.simHour) }),
                                }
                            }),
                            fetch('/api/break-glass/my-active', {
                                headers: { 'Authorization': `Bearer ${auth.token}` }
                            }).catch(() => null),
                        ]);
                        if (detailRes && detailRes.ok) {
                            setCaseDetail(await detailRes.json());
                        }
                        if (bgRes && bgRes.ok) {
                            const data = await bgRes.json();
                            setBgActive(Array.isArray(data.activations) ? data.activations : []);
                        } else {
                            setBgActive([]);
                        }
                    } catch (err) {
                        console.error('Case detail fetch error:', err);
                    } finally {
                        setLoading(false);
                    }
                };

                fetchAll();
            }, [auth.token, caseId, sim.deviceId, sim.location, sim.simHour, refreshCounter]);

            // 접근 점수/레벨 실시간 갱신.
            // 이 엔드포인트는 access_logs 를 새로 쓰지 않는 읽기 전용 평가라,
            // 폴링 자체가 행동 위험 점수를 올리지 않는다.
            useEffect(() => {
                if (!auth.token || !caseId) return;
                let cancelled = false;

                const refreshAccessStatus = async () => {
                    try {
                        const res = await fetch(`/api/resources/cases/${caseId}/status`, {
                            headers: {
                                'Authorization': `Bearer ${auth.token}`,
                                'X-Device-Id': encodeURIComponent(sim.deviceId),
                                'X-Location': encodeURIComponent(sim.location),
                                ...(sim.simHour != null && { 'X-Sim-Hour': String(sim.simHour) }),
                            }
                        });
                        if (!res.ok) return;
                        const data = await res.json();
                        if (cancelled) return;
                        setCaseDetail(prev => {
                            if (!prev) return prev;
                            return {
                                ...prev,
                                decision: data.decision || prev.decision,
                                scoring: data.scoring || prev.scoring,
                                resource: data.resource
                                    ? { ...prev.resource, ...data.resource }
                                    : prev.resource,
                                external_message: '',
                                policy_check: null,
                                anomaly_check: null,
                            };
                        });
                    } catch (_) {
                        // 일시 오류는 다음 tick 에서 복구.
                    }
                };

                refreshAccessStatus();
                const id = setInterval(refreshAccessStatus, 3000);
                return () => { cancelled = true; clearInterval(id); };
            }, [auth.token, caseId, sim.deviceId, sim.location, sim.simHour]);

            useEffect(() => {
                const level = caseDetail?.decision?.level || 1;
                const bg = !!(caseDetail?.decision && caseDetail.decision.break_glass);
                if (showViewModal && level > 2 && !bg) {
                    setShowViewModal(false);
                }
            }, [caseDetail?.decision?.level, showViewModal]);

            // 실제 파일 다운로드 — /api/resources/cases/:id/file 로 요청.
            // 서버가 action_type='download' 로 재평가하고 허용 시 attachment
            // 로 본문(text/plain) 을 돌려준다. 프론트는 Blob 으로 받아서
            // <a download> 트릭으로 저장 대화상자를 띄운다.
            const handleDownload = async () => {
                setDownloadLoading(true);
                try {
                    const response = await fetch(`/api/resources/cases/${caseId}/file`, {
                        method: 'GET',
                        headers: {
                            'Authorization': `Bearer ${auth.token}`,
                            'X-Device-Id': encodeURIComponent(sim.deviceId),
                            'X-Location': encodeURIComponent(sim.location),
                            ...(sim.simHour != null && { 'X-Sim-Hour': String(sim.simHour) }),
                        }
                    });
                    if (!response.ok) {
                        const data = await response.json().catch(() => ({}));
                        if (data.decision || data.scoring || data.resource) {
                            setCaseDetail(prev => prev ? ({
                                ...prev,
                                decision: data.decision || prev.decision,
                                scoring: data.scoring || prev.scoring,
                                resource: data.resource
                                    ? { ...prev.resource, ...data.resource }
                                    : prev.resource,
                                external_message: data.error || prev.external_message,
                            }) : prev);
                        }
                        alert(data.error || `다운로드가 제한되었습니다 (HTTP ${response.status})`);
                        return;
                    }
                    const blob = await response.blob();
                    // 파일명은 Content-Disposition 에서 추출(없으면 case_number 기반).
                    const cd = response.headers.get('Content-Disposition') || '';
                    const m = /filename\*?=(?:UTF-8''|")?([^";]+)"?/i.exec(cd);
                    const fallback = (caseDetail?.resource?.case_number || `case-${caseId}`) + '.txt';
                    const name = decodeURIComponent(m ? m[1] : fallback).replace(/"/g, '');
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = name;
                    document.body.appendChild(a);
                    a.click();
                    setTimeout(() => {
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                    }, 0);
                } catch (err) {
                    console.error('Download error:', err);
                    alert('다운로드 요청 중 오류가 발생했습니다.');
                } finally {
                    setDownloadLoading(false);
                }
            };

            // Level 3 재인증 — OTP 를 입력해 /api/auth/reauth 에 POST.
            // 성공하면 sessions.reauth_at 이 갱신되어, 재조회 시 force_reauth
            // 우회가 적용된다(REAUTH_TTL_SEC 이내).
            const handleReauthSubmit = async (e) => {
                if (e && e.preventDefault) e.preventDefault();
                setReauthError(null);
                if (!/^\d{6}$/.test((reauthOtp || '').trim())) {
                    setReauthError('토큰 기기에 표시된 6자리 OTP 코드를 입력해 주세요.');
                    return;
                }
                setReauthSubmitting(true);
                try {
                    const res = await fetch('/api/auth/reauth', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${auth.token}`,
                            'X-Device-Id': encodeURIComponent(sim.deviceId),
                            'X-Location': encodeURIComponent(sim.location),
                            ...(sim.simHour != null && { 'X-Sim-Hour': String(sim.simHour) }),
                        },
                        body: JSON.stringify({ otp_code: reauthOtp.trim() })
                    });
                    const data = await res.json().catch(() => ({}));
                    if (!res.ok) {
                        setReauthError(data.error || `재인증 실패 (HTTP ${res.status})`);
                        return;
                    }
                    setShowReauthModal(false);
                    setReauthOtp('');
                    setReauthError(null);
                    setRefreshCounter(c => c + 1);
                } catch (err) {
                    setReauthError(`요청 실패: ${err.message || err}`);
                } finally {
                    setReauthSubmitting(false);
                }
            };

            // Phase 2 — Break-Glass 자가발동
            const handleBgActivate = async (e) => {
                if (e && e.preventDefault) e.preventDefault();
                setBgError(null);

                if ((bgJustification || '').trim().length < 10) {
                    setBgError('정당화 사유는 최소 10자 이상이어야 합니다.');
                    return;
                }
                if (!/^\d{6}$/.test((bgMfaCode || '').trim())) {
                    setBgError('토큰 기기의 6자리 MFA 코드를 입력해 주세요.');
                    return;
                }

                setBgSubmitting(true);
                try {
                    const res = await fetch('/api/break-glass/activate', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${auth.token}`,
                            'X-Device-Id': encodeURIComponent(sim.deviceId),
                            'X-Location': encodeURIComponent(sim.location),
                            ...(sim.simHour != null && { 'X-Sim-Hour': String(sim.simHour) }),
                        },
                        body: JSON.stringify({
                            scope: 'resource',
                            resource_id: parseInt(caseId, 10),
                            justification: bgJustification.trim(),
                            mfa_code: bgMfaCode.trim(),
                        })
                    });
                    const data = await res.json().catch(() => ({}));
                    if (!res.ok) {
                        setBgError(data.error || data.message || `발동 실패 (HTTP ${res.status})`);
                        return;
                    }
                    // 성공 — 모달 닫고 자원 재조회 (access_evaluator 가 BG 를 인지해 level 하향)
                    setShowBgModal(false);
                    setBgJustification('');
                    setBgMfaCode('');
                    setBgError(null);
                    setRefreshCounter(c => c + 1);
                    alert('Break-Glass 발동 완료 — 긴급 접근이 허용됩니다.\n\n모든 활동은 감사 로그와 사후 관리자 리뷰 대상입니다.');
                } catch (err) {
                    setBgError(`요청 실패: ${err.message || err}`);
                } finally {
                    setBgSubmitting(false);
                }
            };

            // L4 관리자 승인 요청 접수 — POST /api/resources/cases/:id/request-approval
            // 이전에는 자원을 열어보기만 해도 approvals 가 자동 INSERT 되어
            // 관리자 대기열이 의도치 않게 부풀었다. 이제는 사용자가
            // "승인 요청 보내기" 버튼을 눌러야만 이 엔드포인트가 호출되어
            // 승인 대기열에 들어간다. 서버는 동일 requester+resource 에
            // pending 요청이 이미 있으면 200 + existing:true 로 idempotent.
            const handleRequestApproval = async () => {
                if (approvalSubmitting) return;
                setApprovalSubmitting(true);
                setApprovalMessage(null);
                try {
                    const res = await fetch(`/api/resources/cases/${caseId}/request-approval`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${auth.token}`,
                            'X-Device-Id': encodeURIComponent(sim.deviceId),
                            'X-Location': encodeURIComponent(sim.location),
                            ...(sim.simHour != null && { 'X-Sim-Hour': String(sim.simHour) }),
                        },
                        body: JSON.stringify({}),
                    });
                    const data = await res.json().catch(() => ({}));
                    if (!res.ok) {
                        setApprovalMessage(
                            data.error || `승인 요청 실패 (HTTP ${res.status})`
                        );
                        return;
                    }
                    setApprovalRequest({
                        approval_id: data.approval_id,
                        status: data.status || 'pending',
                        existing: !!data.existing,
                    });
                    setApprovalMessage(
                        data.existing
                            ? '이미 대기 중인 승인 요청이 있습니다. 관리자 처리 결과를 기다려 주세요.'
                            : '승인 요청이 접수되었습니다. 관리자 검토를 기다려 주세요.'
                    );
                } catch (err) {
                    setApprovalMessage(`요청 실패: ${err.message || err}`);
                } finally {
                    setApprovalSubmitting(false);
                }
            };

            const handleBgRelease = async (activationId) => {
                if (!confirm('이 Break-Glass 를 지금 해제하시겠습니까?\n해제 후에도 관리자 사후 리뷰 대상입니다.')) return;
                try {
                    const res = await fetch(`/api/break-glass/${activationId}/release`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${auth.token}` }
                    });
                    if (!res.ok) {
                        const data = await res.json().catch(() => ({}));
                        alert(`해제 실패: ${data.error || data.message || res.status}`);
                        return;
                    }
                    setRefreshCounter(c => c + 1);
                } catch (err) {
                    alert(`해제 실패: ${err.message || err}`);
                }
            };

            if (loading) return <LoadingSpinner />;
            if (!caseDetail) return <div className="text-center text-slate-600">사건 정보를 로드할 수 없습니다</div>;

            const { decision, scoring, resource, policy_check, anomaly_check, external_message } = caseDetail;

            // Break-Glass 판정
            const viaBreakGlass = !!(decision && decision.break_glass);
            const grade = resource?.sensitivity_grade || 0;
            const dLevel = decision?.level || 1;
            // 현재 자원에 유효한 활성 BG (scope='resource' 매칭 또는 scope='broad')
            const myBgForThis = (bgActive || []).find(bg =>
                bg.scope === 'broad' ||
                (bg.scope === 'resource' && Number(bg.resource_id) === Number(caseId))
            );
            // BG 발동 버튼 노출 조건:
            //   - 현재 경로가 BG 를 타지 않고 있고 (viaBreakGlass 가 false)
            //   - 자원이 Grade >= 4 (BG 대상 등급)
            //   - 접근이 제한되어 있음 (dLevel >= 4, 요약만/차단)
            //   - 아직 이 자원용 활성 BG 가 없음
            const canRequestBg = !viaBreakGlass && grade >= 4 && dLevel >= 4 && !myBgForThis;

            return (
                <div className="space-y-6">
                    <button
                        onClick={() => window.location.hash = '#case-list'}
                        className="text-police-600 hover:text-police-700 mb-4"
                    >
                        ← 목록으로 돌아가기
                    </button>

                    {/* Decision Banner */}
                    <DecisionBanner decision={decision} />

                    {/* Break-Glass 배너 — 현재 이 자원이 BG 로 열려 있을 때 */}
                    {viaBreakGlass && (
                        <div className="glass-card p-5 rounded-lg border-2 border-red-400 bg-red-50/60">
                            <div className="flex items-start gap-3">
                                <div className="text-3xl">🚨</div>
                                <div className="flex-1">
                                    <p className="font-bold text-red-800 text-lg">
                                        Break-Glass 로 긴급 접근 중 — 열람·다운로드 허용
                                    </p>
                                    <p className="text-sm text-red-800 mt-1">
                                        이 세션은 일반 정책을 우회해 열람·다운로드가 모두 허용되고 있습니다.
                                        모든 활동은 감사 로그에 남아 관리자 사후 리뷰 대상이 됩니다. 정당하지 않은 사용은
                                        신뢰점수 차감 및 위반 1건으로 기록됩니다.
                                    </p>
                                    <div className="mt-3 text-xs text-red-800/90 font-mono">
                                        activation #{decision.break_glass.activation_id}
                                        {' · '}scope={decision.break_glass.scope}
                                        {decision.break_glass.expires_at && (
                                            <> {' · '}만료={decision.break_glass.expires_at}</>
                                        )}
                                    </div>
                                    {myBgForThis && (
                                        <div className="mt-3">
                                            <button
                                                onClick={() => handleBgRelease(myBgForThis.id)}
                                                className="text-sm bg-slate-50 hover:bg-slate-100 text-slate-900 px-3 py-1 rounded"
                                            >
                                                지금 해제
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Break-Glass 발동 버튼 — 등급 4+ 자원에 접근 차단/요약 상태이고 BG 미발동 */}
                    {canRequestBg && (
                        <div className="glass-card p-5 rounded-lg border border-amber-300 bg-amber-950/30">
                            <div className="flex items-start gap-3">
                                <div className="text-3xl">🛑</div>
                                <div className="flex-1">
                                    <p className="font-bold text-amber-800">
                                        접근이 제한됩니다 — Break-Glass 로 긴급 접근 요청
                                    </p>
                                    <p className="text-sm text-amber-800/90 mt-1">
                                        토큰 기기를 보유한 경우, 자기 책임 하에 Break-Glass 를 발동해
                                        30분 동안 열람 및 다운로드를 모두 수행할 수 있습니다.
                                        발동 즉시 관리자에게 알림이 전송되며, 사용 후 반드시 리뷰를 받게 됩니다.
                                        정당하지 않다고 판정되면 신뢰점수 패널티가 즉시 적용됩니다.
                                    </p>
                                    <button
                                        onClick={() => { setBgError(null); setShowBgModal(true); }}
                                        className="mt-3 bg-red-700 hover:bg-red-600 text-white text-sm font-semibold px-4 py-2 rounded"
                                    >
                                        🚨 Break-Glass 발동
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Break-Glass 발동 모달 */}
                    {showBgModal && (
                        <div
                            className="fixed inset-0 z-50 flex items-center justify-center bg-black/70"
                            onClick={() => !bgSubmitting && setShowBgModal(false)}
                        >
                            <div

        // ============ ADMIN PAGE ============
        // ============ TOAST NOTIFICATION ============
        function useToast() {
            const [toasts, setToasts] = useState([]);
            const addToast = useCallback((message, type = 'info') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
            }, []);
            return { toasts, addToast };
        }

        function ToastContainer({ toasts }) {
            if (!toasts.length) return null;
            const colors = {
                success: 'bg-green-600 border-green-400',
                error: 'bg-red-600 border-red-400',
                info: 'bg-police-600 border-blue-400',
                warning: 'bg-amber-600 border-amber-400',
            };
            return (
                <div className="fixed top-6 right-6 z-50 space-y-2" style={{ minWidth: '300px' }}>
                    {toasts.map(t => (
                        <div key={t.id} className={`${colors[t.type] || colors.info} border-l-4 text-slate-900 px-5 py-3 rounded shadow-lg animate-fade-in`}>
                            {t.message}
                        </div>
                    ))}
                </div>
            );
        }
