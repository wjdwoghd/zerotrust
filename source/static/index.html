    <!-- Tailwind CSS from CDN -->

                            400: '#D4AF37',  // 메인 골드

                        }
                    }
                }
            }
        };
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        }

        /* 헤더 하단 금색 강조 라인 — 경찰 브랜딩 */
        .gold-accent-line {
            height: 3px;
            background: linear-gradient(
                to right,

            );

        .gold-border-bottom {
            border-bottom: 2px solid #D4AF37;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(30, 58, 138, 0.12);
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
        }

        .watermark {
            position: relative;
        }

        .watermark::before {
            content: '기밀';
            position: absolute;
            top: 50%;

        .case-card-restricted {

        .blur-strong {

        .progress-fill {

        @keyframes slideIn {

                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .threshold-table td {
            padding: 8px 12px;
            border-bottom: 1px solid #E2E8F0;
        }

        .threshold-current {
            background: rgba(30, 58, 138, 0.08);
            border-left: 3px solid #1E3A8A;

<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <!-- React, ReactDOM, Babel from CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- #22 OTP QR 코드 생성용. CSP 가 외부 img 호출을 막으므로 클라이언트에서
         data:URL 로 만들어 <img> 에 박는다. unpkg.com 은 script-src 에 허용됨. -->
    <script src="https://unpkg.com/qrcode-generator@1.4.4/qrcode.js"></script>

    <script type="text/babel">
        const { useState, useContext, createContext, useEffect, useCallback, useRef } = React;

        // ============ CONTEXT SETUP ============
        const AuthContext = createContext();
        const SimulationContext = createContext();

        // ============ AUTH PROVIDER ============
        // 토큰 영속화 정책 (#30):
        // - sessionStorage 에 저장 → 새로고침 시 유지, 탭/브라우저 닫으면 폐기
        //   (localStorage 가 아닌 이유: Zero-Trust 원칙상 무기한 영구화는 부적절)
        // - 마운트 시 lazy init 으로 토큰을 복원하면 isAuthenticated 가 즉시 true 가 되고,
        //   30초 폴링의 첫 tick(refreshSessionTimer) 이 /api/auth/me 로 user 객체와
        //   세션 타이머를 같이 채워 준다.
        // - 토큰이 서버 측에서 무효(만료/취소) 라면 그 첫 호출의 401 처리로
        //   token/user 가 정리되어 로그인 화면으로 자연스럽게 떨어진다.
        const _ZT_TOKEN_KEY = 'zt_token_v1';
        function _readStoredToken() {
            try { return sessionStorage.getItem(_ZT_TOKEN_KEY) || null; }
            catch (_) { return null; }
        }

        function AuthProvider({ children }) {
            const [token, setToken] = useState(_readStoredToken);
            const [user, setUser] = useState(null);
            const tokenRef = useRef(token);

            // token 이 바뀔 때마다 sessionStorage 동기화. logout / 401-비유효
            // 어떤 경로에서 setToken(null) 이 호출되더라도 한 곳에서 정리된다.
            useEffect(() => {
                tokenRef.current = token;
                try {
                    if (token) sessionStorage.setItem(_ZT_TOKEN_KEY, token);
                    else sessionStorage.removeItem(_ZT_TOKEN_KEY);
                } catch (_) { /* private mode 등 — 무시 */ }
            }, [token]);

            useEffect(() => {
                if (!token) return;
                let stopped = false;
                const beat = () => {
                    const currentToken = tokenRef.current;
                    if (stopped || !currentToken) return;
                    fetch('/api/auth/heartbeat', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${currentToken}` },
                        keepalive: true
                    }).catch(() => {});
                };

                beat();
                const id = setInterval(beat, 3000);
                return () => {
                    stopped = true;
                    clearInterval(id);
                };
            }, [token]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [errorCode, setErrorCode] = useState(null);
            const [mfaRequired, setMfaRequired] = useState(false);
            const [tempToken, setTempToken] = useState(null);
            // 1차 토큰의 부가 메타 — MFA 화면 분기에 사용
            const [mfaMeta, setMfaMeta] = useState({
                adminGated: false,
                hasTokenDevice: true,
            });
            // 관리자 로그인 승인 게이트: 의심 계정 / 토큰 기기 미보유 계정의
            // 로그인 승인 대기 상태 (과거 "breakGlass" 상태).
            const [adminApproval, setAdminApproval] = useState(null);
            // { username, password, deviceId, location, requestId, state, expiresAt }

            const login = useCallback(async (username, password, deviceId, location) => {
                setLoading(true);
                setError(null);
                setErrorCode(null);
                try {
                    const response = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            username,
                            password,
                            device_id: deviceId,
                            location
                        })
                    });

                    if (!response.ok) {
                        const data = await response.json().catch(() => ({}));
                        const code = data.code || null;
                        setErrorCode(code);
                        // 관리자 로그인 승인 대기 모드로 진입
                        if (code === 'admin_approval_required') {
                            setAdminApproval({
                                username, password, deviceId, location,
                                // 하위호환: 서버가 approval_request_id 또는 break_glass_request_id 중
                                // 하나를 돌려줄 수 있음.
                                requestId: data.approval_request_id
                                           || data.break_glass_request_id
                                           || null,
                                state: 'pending',
                                expiresAt: null,
                                message: data.message || '관리자 승인이 필요합니다.',
                            });
                            setError(null);
                            return;
                        }
                        throw new Error(data.message || '로그인 실패');
                    }

                    const data = await response.json();

                    if (data.mfa_required) {
                        setMfaRequired(true);
                        setTempToken(data.token);
                        setMfaMeta({
                            // 하위호환: 구 응답의 break_glass 도 허용.
                            adminGated: !!(data.admin_gated ?? data.break_glass),
                            // has_token_device 가 명시되지 않은 옛 응답은 true 로 가정.
                            hasTokenDevice: data.has_token_device !== false,
                        });
                        // 로그인 성공 시 승인 대기 상태 해제
                        setAdminApproval(null);
                    } else {
                        setToken(data.token);
                        setUser(data.user);
                        setMfaRequired(false);
                        setAdminApproval(null);
                    }
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            }, []);

            // 승인 대기 취소
            const cancelAdminApproval = useCallback(() => {
                setAdminApproval(null);
                setError(null);
                setErrorCode(null);
            }, []);

            // 관리자 승인 감시 — 5초 간격 폴링
            useEffect(() => {
                if (!adminApproval || adminApproval.state !== 'pending') return;
                if (!adminApproval.username) return;

                let cancelled = false;
                const tick = async () => {
                    try {
                        const res = await fetch(
                            `/api/auth/login-approval/status?username=${encodeURIComponent(adminApproval.username)}`
                        );
                        if (!res.ok) return;
                        const data = await res.json();
                        if (cancelled) return;
                        if (data.state === 'approved') {
                            // 승인이 떨어지면 로그인 재시도
                            setAdminApproval(prev => prev && ({ ...prev, state: 'approved', expiresAt: data.expires_at }));
                            // 자동 재로그인
                            login(
                                adminApproval.username,
                                adminApproval.password,
                                adminApproval.deviceId,
                                adminApproval.location
                            );
                        } else if (data.state === 'rejected') {
                            setAdminApproval(prev => prev && ({ ...prev, state: 'rejected' }));
                        } else if (data.state === 'none') {
                            // 승인 요청이 만료되어 사라진 경우
                            setAdminApproval(prev => prev && ({ ...prev, state: 'expired' }));
                        }
                    } catch (e) {
                        // polling 실패는 조용히 재시도
                    }
                };
                tick();
                const iv = setInterval(tick, 5000);
                return () => { cancelled = true; clearInterval(iv); };
            }, [adminApproval?.state, adminApproval?.username, login]);

            const verifyMfa = useCallback(async (otpCode, deviceId, location) => {
                setLoading(true);
                setError(null);
                setErrorCode(null);
                try {
                    const response = await fetch('/api/auth/mfa/verify', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${tempToken}`
                        },
                        body: JSON.stringify({
                            otp_code: otpCode,
                            device_id: deviceId,
                            location
                        })
                    });

                    if (!response.ok) {
                        const data = await response.json().catch(() => ({}));
                        const code = data.code || null;
                        // 동시 접속 정책(B안): 이미 live 세션이 있는 계정의
                        // 신규 로그인은 409 already_logged_in 으로 거부된다.
                        // MFA 단계를 닫고 로그인 화면으로 되돌리며, 친절한
                        // 안내 문구를 error 로 노출한다. 기존 세션 쪽은
                        // 폴링으로 pending_reauth 를 감지해 재인증 모달을 띄운다.
                        if (response.status === 409 && code === 'already_logged_in') {
                            setMfaRequired(false);
                            setTempToken(null);
                            setErrorCode('already_logged_in');
                            setError(
                                data.message ||
                                '이 계정은 이미 다른 기기/브라우저에서 로그인되어 있습니다. ' +
                                '해당 세션에서 먼저 로그아웃한 뒤 다시 시도하세요.'
                            );
                            return;
                        }
                        setErrorCode(code);
                        throw new Error(data.message || 'MFA 검증 실패');
                    }

                    const data = await response.json();
                    setToken(data.token);
                    setUser(data.user);
                    setMfaRequired(false);
                    setTempToken(null);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            }, [tempToken]);

            const logout = useCallback(async () => {
                if (token) {
                    try {
                        await fetch('/api/auth/logout', {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                    } catch (err) {
                        console.error('Logout error:', err);
                    }
                }
                setToken(null);
                setUser(null);
                setMfaRequired(false);
                setTempToken(null);
            }, [token]);

            // ── 동시 접속 정책: pending_reauth 상태 감지 및 해제 ──
            // 서버는 두 번째 로그인 탐지 시 양쪽 세션을 pending_reauth=TRUE 로
            // 잠그고, 이 세션으로 보호된 API 를 호출하면 401 code=
            // 'concurrent_session_detected' 를 반환한다.
            // 여기서는 30초 주기로 /api/auth/me 를 폴링해 이를 감지하고,
            // 감지되면 전역 모달을 띄워 MFA 재인증을 유도한다.
            //
            // 추가(#24): 같은 폴링 응답에서 세션 타이머(유휴/절대 만료) 잔여
            // 초를 받아 sessionTimer 상태로 동기화하고, 별도 1초 interval 로
            // 클라이언트 측 카운트다운을 진행한다.
            const [concurrentReauthRequired, setConcurrentReauthRequired] = useState(false);
            const [sessionTimer, setSessionTimer] = useState(null);
            // sessionTimer 모양:
            //   { idleRemaining:int, idleTotal:int,
            //     absoluteRemaining:int|null, isAdminGated:bool }

            // #29 (8-2): 1분 임계 통과 시 OTP 재인증 모달을 띄우기 위한 상태.
            const [extendPromptVisible, setExtendPromptVisible] = useState(false);

            // /api/auth/me 폴링을 외부(SessionExtendModal) 에서도 강제 호출할
            // 수 있게 useCallback 으로 분리. token 이 바뀌면 함수 정체성도 바뀐다.
            const refreshSessionTimer = useCallback(async () => {
                if (!token) return;
                try {
                    const res = await fetch('/api/auth/me', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.status === 401) {
                        const data = await res.json().catch(() => ({}));
                        if (data.code === 'concurrent_session_detected') {
                            // 토큰 자체는 유효 — 동시 접속 모달만 띄우면 됨.
                            setConcurrentReauthRequired(true);
                        } else {
                            // #30: 토큰/세션이 서버에서 무효화된 경우(만료, 취소,
                            // mfa_required 등) 클라이언트 토큰도 폐기해 로그인
                            // 화면으로 명시적으로 되돌린다. setToken(null) 의
                            // 부수 효과로 sessionStorage 도 자동 정리된다.
                            setToken(null);
                            setUser(null);
                            setSessionTimer(null);
                        }
                    } else if (res.ok) {
                        setConcurrentReauthRequired(false);
                        const data = await res.json().catch(() => null);
                        // #30: 새로고침 직후 user 가 null 인 상태에서 복원.
                        // (이미 채워져 있어도 최신 상태로 갱신해 두면 trust_score
                        //  같은 값이 자연스럽게 동기화된다.)
                        if (data && data.user) {
                            setUser(data.user);
                        }
                        const s = data && data.session;
                        if (s && typeof s.idle_remaining_seconds === 'number') {
                            setSessionTimer({
                                idleRemaining: s.idle_remaining_seconds,
                                idleTotal: s.idle_timeout_seconds || 900,
                                absoluteRemaining:
                                    typeof s.absolute_remaining_seconds === 'number'
                                        ? s.absolute_remaining_seconds : null,
                                isAdminGated: !!s.is_admin_gated,
                            });
                        }
                    } else if (res.status === 403) {
                        // 계정 잠금 등 — 로그아웃 처리.
                        setToken(null);
                        setUser(null);
                        setSessionTimer(null);
                    }
                } catch (_) {
                    // 네트워크 일시 오류는 무시.
                }
            }, [token]);

            useEffect(() => {
                if (!token) {
                    setConcurrentReauthRequired(false);
                    setSessionTimer(null);
                    setExtendPromptVisible(false);
                    return;
                }
                let cancelled = false;
                const tick = async () => {
                    if (cancelled) return;
                    await refreshSessionTimer();
                };
                tick();
                // 30초 주기는 동시 접속 감지에 적당. 타이머는 1초 단위 로컬 카운트다운으로 보정.
                const id = setInterval(tick, 30000);
                return () => { cancelled = true; clearInterval(id); };
            }, [token, refreshSessionTimer]);

            // 1초 카운트다운: 폴링 사이의 시각 표시를 부드럽게 만든다.
            // setState 콜백에서 -1 차감하므로 stale closure 위험 없음.
            useEffect(() => {
                if (!token) return;
                const id = setInterval(() => {
                    setSessionTimer(prev => {
                        if (!prev) return prev;
                        return {
                            ...prev,
                            idleRemaining: Math.max(0, prev.idleRemaining - 1),
                            absoluteRemaining: prev.absoluteRemaining != null
                                ? Math.max(0, prev.absoluteRemaining - 1)
                                : null,
                        };
                    });
                }, 1000);
                return () => clearInterval(id);
            }, [token]);

            // 재인증 성공/실패 후 상태를 수동으로 조정할 수 있는 setter 노출.
            const resolveConcurrentReauth = useCallback(() => {
                setConcurrentReauthRequired(false);
            }, []);

            const requestSessionExtend = useCallback(() => {
                setExtendPromptVisible(true);
            }, []);
            const dismissSessionExtend = useCallback(() => {
                setExtendPromptVisible(false);
            }, []);

            return (
                <AuthContext.Provider value={{
                    token,
                    tempToken,
                    user,
                    loading,
                    error,
                    errorCode,
                    mfaRequired,
                    mfaMeta,
                    login,
                    verifyMfa,
                    logout,
                    adminApproval,
                    cancelAdminApproval,
                    concurrentReauthRequired,
                    resolveConcurrentReauth,
                    sessionTimer,
                    extendPromptVisible,
                    requestSessionExtend,
                    dismissSessionExtend,
                    refreshSessionTimer,
                    isAuthenticated: !!token
                }}>
                    {children}
                </AuthContext.Provider>
            );
        }

        // ============ SIMULATION PROVIDER ============
        // 계정별 기본 등록 기기 (seed 와 일치) — 로그인 페이지의 자동 제안용.
        // deputy_han / deputy_oh 는 부관리자 시드 (registered-008/009).
        const DEFAULT_DEVICE_BY_USERNAME = {
            detective_kim:     'registered-001',
            investigator_park: 'registered-003',
            admin_lee:         'registered-004',
            officer_choi:      'registered-006',
            patrol_jung:       'registered-007',
            deputy_han:        'registered-008',
            deputy_oh:         'registered-009',
        };

        // 영문 reason 코드 → 한국어 매핑. 매핑 없으면 코드 그대로 표시 (fallback).
        const friendlyReason = (code) => {
            if (typeof code !== 'string') return code;
            return REASON_LABELS[code] || code;
        };

        // 값 변환 — boolean/배열/숫자(시간초)/객체 → 사람이 읽기 쉬운 형태
        const formatDetailValue = (key, value) => {
            if (value === null || value === undefined || value === '') return '-';
            if (typeof value === 'boolean') return value ? '예' : '아니오';
            // reason / code 키의 영문 코드값은 한국어로 친화 표시
            if ((key === 'reason' || key === 'code') && typeof value === 'string') {
                return friendlyReason(value);
            }
            if (Array.isArray(value)) {
                if (value.length === 0) return '없음';
                return value.map(v => (typeof v === 'object' ? JSON.stringify(v) : String(v))).join(', ');
            }
            if (typeof value === 'object') {
                // 중첩 객체는 JSON 으로 (드물게 발생)
                return JSON.stringify(value);
            }
            // _seconds 로 끝나는 정수는 분/시간 환산 보조 표기
            if (typeof value === 'number' && /_seconds?$/.test(key)) {
                if (value >= 3600) {
                    const h = Math.floor(value / 3600);
                    const rest = value % 3600;
                    if (rest === 0) return `${h}시간 (${value}초)`;
                    const m = Math.floor(rest / 60);
                    return `${h}시간 ${m}분 (${value}초)`;
                }
                if (value >= 60) {
                    const m = Math.floor(value / 60);
                    const s = value % 60;
                    if (s === 0) return `${m}분 (${value}초)`;
                    return `${m}분 ${s}초 (${value}초)`;
                }
                return `${value}초`;
            }
            return String(value);
        };

        // 외부 클릭 닫힘은 onBlur (capture) 로 처리. selected 는 Set 으로 받는다.
        function MultiSelectDropdown({ label, options, selected, onToggle, onClear, placeholder='검색...' }) {
            const [open, setOpen] = useState(false);
            const [search, setSearch] = useState('');
            const containerRef = useRef(null);

            // 외부 클릭 시 닫힘 — mousedown 단계에서 컨테이너 외부면 close
            useEffect(() => {
                if (!open) return;
                const onDoc = (e) => {
                    if (containerRef.current && !containerRef.current.contains(e.target)) {
                        setOpen(false);
                    }
                };
                document.addEventListener('mousedown', onDoc);
                return () => document.removeEventListener('mousedown', onDoc);
            }, [open]);

            const filtered = options.filter(o =>
                !search || String(o).toLowerCase().includes(search.toLowerCase())
            );

            return (
                <div className="relative" ref={containerRef}>
                    <button
                        type="button"
                        onClick={() => setOpen(!open)}
                        className="w-full flex items-center justify-between px-3 py-2 bg-white border border-slate-200 rounded hover:border-police-400 text-sm transition"

                                    filtered.map(opt => (
                                        <label

            const [otpCode, setOtpCode] = useState('');
            const [otpMessage, setOtpMessage] = useState('');

            // username 을 바꾸면 해당 계정의 기본 등록 기기를 자동 제안.
            // - 시드 사용자 7명 — 클라이언트 정적 매핑 (DEFAULT_DEVICE_BY_USERNAME)
            //   에서 즉시 채움.
            // - 신규 계정 (admin 이 만든 registered-new-NNN 등) — 서버
            //   /api/auth/device-hint 를 debounce 호출해 default work device 제안.
            // - 사용자가 직접 입력한 값(자동 제안 풀 외)은 존중해서 건드리지 않는다.
            const autoSuggestedRef = useRef(
                new Set(Object.values(DEFAULT_DEVICE_BY_USERNAME))
            );
            const hintTimerRef = useRef(null);

            const onUsernameChange = (v) => {
                setUsername(v);
                const current = sim.deviceId;
                // 직접 입력한 device 는 보존 (자동 제안 풀에 없으면 사용자 의도)
                if (current && !autoSuggestedRef.current.has(current)) return;

                // 1) 시드 매핑 — 즉시 채움
                const seed = DEFAULT_DEVICE_BY_USERNAME[v];
                if (seed) {
                    sim.setDeviceId(seed);
                    return;
                }

                // 2) 신규 계정 — server hint debounce 호출
                if (hintTimerRef.current) clearTimeout(hintTimerRef.current);
                if (!v || v.trim().length < 3) return;
                hintTimerRef.current = setTimeout(async () => {
                    try {
                        const res = await fetch(
                            `/api/auth/device-hint?username=${encodeURIComponent(v)}`
                        );
                        if (!res.ok) return;
                        const data = await res.json();
                        const hint = data.work_device_id;
                        if (!hint) return;
                        // 사용자가 그 사이 직접 다른 값을 입력했으면 보존
                        const cur = sim.deviceId;
                        if (cur && !autoSuggestedRef.current.has(cur)) return;
                        sim.setDeviceId(hint);
                        autoSuggestedRef.current.add(hint);
                    } catch (_) {
                        // 네트워크 오류 — 사용자가 직접 입력 가능
                    }
                }, 300);
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                if (!sim.deviceId) {
                    alert('기기 ID 를 선택/입력하세요. 등록되지 않은 기기로는 로그인할 수 없습니다.');
                    return;
                }
                await auth.login(username, password, sim.deviceId, sim.location);
            };

            const handleMfaSubmit = async (e) => {
                e.preventDefault();
                await auth.verifyMfa(otpCode, sim.deviceId, sim.location);
            };

            // "OTP 전송" — 1차 토큰으로 /api/auth/mfa/otp 호출.
            // 서버는 코드 자체를 돌려주지 않는다. 사용자는 별도로 실행 중인
            // "토큰 기기 앱" (apps/virtual_device.py) 창에서 6자리 코드를
            // 확인해 이 로그인 창에 직접 입력해야 한다.
            const requestDeviceOtp = async () => {
                setOtpMessage('');
                try {
                    const res = await fetch('/api/auth/mfa/otp', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${auth.tempToken}`,
                        },
                        body: JSON.stringify({ device_id: sim.deviceId }),
                    });
                    const data = await res.json();
                    if (!res.ok) {
                        setOtpMessage(data.error || 'OTP 전송 실패');
                        return;
                    }
                    const devLabel = data.token_device_name
                        || data.device_name
                        || sim.deviceId;
                    setOtpMessage(
                        `토큰 기기 "${devLabel}" 로 OTP 가 전송되었습니다. ` +
                        `토큰 기기 앱 창에서 6자리 코드를 확인해 아래에 입력하세요.`
                    );
                } catch (e) {
                    setOtpMessage('OTP 전송 실패: ' + e.message);
                }
            };

            const approval = auth.adminApproval;

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4">
                    {approval && (
                        <Modal
                            title={
                                approval.state === 'pending'  ? '🔒 관리자 승인 대기 중' :
                                approval.state === 'approved' ? '✅ 승인 완료 — 로그인 진행' :
                                approval.state === 'rejected' ? '⛔ 로그인 반려' :
                                approval.state === 'expired'  ? '⌛ 승인 요청 만료' :
                                                                 '🔒 관리자 승인'
                            }
                            onClose={() => auth.cancelAdminApproval()}
                        >
                            {approval.state === 'pending' && (
                                <div className="space-y-3 text-sm text-slate-800">
                                    <p>
                                        이 계정은 <b>의심 계정</b>으로 분류되어 있어,
                                        로그인 전에 <b>관리자의 명시적 승인</b>이 필요합니다.
                                    </p>
                                    <p className="text-slate-700">
                                        관리자가 승인하면 자동으로 MFA 단계로 넘어갑니다.
                                        이 창을 닫아도 요청은 유지됩니다.
                                    </p>
                                    <div className="bg-white rounded p-3 font-mono text-xs">
                                        사용자: {approval.username}<br/>
                                        기기: {approval.deviceId}<br/>
                                        위치: {approval.location}<br/>
                                        요청 ID: {approval.requestId ?? '—'}
                                    </div>
                                    <div className="flex items-center gap-2 text-amber-700">
                                        <div className="spinner" style={{width:'1rem', height:'1rem'}}></div>
                                        <span>5초 간격으로 승인 여부를 확인 중…</span>
                                    </div>
                                </div>
                            )}
                            {approval.state === 'approved' && (
                                <div className="space-y-3 text-sm text-slate-800">
                                    <p>관리자가 승인했습니다. 자동으로 로그인 재시도 중입니다…</p>
                                    {approval.expiresAt && (
                                        <p className="text-xs text-slate-600">
                                            승인 만료: {approval.expiresAt}
                                        </p>
                                    )}
                                </div>
                            )}
                            {approval.state === 'rejected' && (
                                <div className="space-y-3 text-sm text-red-800">
                                    <p>관리자가 로그인 요청을 반려했습니다.</p>
                                    <button
                                        onClick={() => auth.cancelAdminApproval()}
                                        className="bg-slate-50 hover:bg-slate-100 text-slate-900 px-4 py-2 rounded"
                                    >닫기</button>
                                </div>
                            )}
                            {approval.state === 'expired' && (
                                <div className="space-y-3 text-sm text-slate-800">
                                    <p>승인 요청이 만료되었습니다. 다시 로그인하면 새 요청이 생성됩니다.</p>
                                    <button
                                        onClick={() => auth.cancelAdminApproval()}
                                        className="bg-slate-50 hover:bg-slate-100 text-slate-900 px-4 py-2 rounded"
                                    >닫기</button>
                                </div>
                            )}
                        </Modal>
                    )}
                    <div className="glass-card rounded-lg p-8 max-w-md w-full border-t-4 border-gold-400">
                        <div className="text-center mb-8">
                            <div className="mb-3 flex justify-center">
                                <svg viewBox="0 0 24 24" width="64" height="64"
                                     fill="#D4AF37" stroke="#1E3A8A" strokeWidth="0.8"
                                     strokeLinejoin="round" aria-label="경찰 방패">
                                    <path d="M12 2L4 5v6c0 5 3.5 9.5 8 11 4.5-1.5 8-6 8-11V5l-8-3z"/>
                                    <path d="M12 7v8M9 11h6" stroke="#1E3A8A" strokeWidth="1.4" fill="none" strokeLinecap="round"/>
                                </svg>
                            </div>
                            <h1 className="text-3xl font-bold text-police-700">
                                제로트러스트 접근제어 시스템
                            </h1>
                            <div className="gold-accent-line my-3 mx-auto w-32"></div>
                            <p className="text-slate-600 text-sm mt-2">
                                경찰 정보 자원 보호 — Zero Trust Access Control
                            </p>
                        </div>

                        {!auth.mfaRequired ? (
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-slate-700 mb-2">
                                        사용자명
                                    </label>
                                    <input
                                        type="text"
                                        value={username}
                                        onChange={(e) => onUsernameChange(e.target.value)}
                                        className="w-full bg-white border border-slate-200 rounded px-3 py-2 text-slate-900 placeholder-slate-400"
                                        placeholder="username"
                                        disabled={auth.loading}
                                    />
                                </div>

                                <div>
                                    <label className="block text-sm font-medium text-slate-700 mb-2">
                                        비밀번호
                                    </label>
                                    <input
                                        type="password"
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                        className="w-full bg-white border border-slate-200 rounded px-3 py-2 text-slate-900 placeholder-slate-400"
                                        placeholder="password"
                                        disabled={auth.loading}
                                    />
                                </div>

                                <div>
                                    <label className="block text-sm font-medium text-slate-700 mb-2">
                                        기기 ID <span className="text-xs text-amber-600">· 본인의 업무 기기로 로그인 하는 것을 권장합니다</span>
                                    </label>
                                    {/*
                                      관리자 패널로 신규 생성한 계정은 `registered-new-NNN` 같이
                                      동적으로 발급된 device_id 를 갖는다. 기존 하드코딩
                                      <select> 로는 드롭다운에 없는 device_id 를 입력할 수 없어
                                      새 계정이 로그인할 수 없었다. <input list="..."> 콤보박스로
                                      바꿔 자유 입력 + 알려진 device_id 제안을 모두 지원한다.
                                    */}
                                    <input
                                        type="text"
                                        list="known-device-ids"
                                        value={sim.deviceId}
                                        onChange={(e) => sim.setDeviceId(e.target.value)}
                                        placeholder="예: registered-001 / 신규 계정은 registered-new-008 등"
                                        className="w-full bg-white border border-slate-200 rounded px-3 py-2 text-slate-900 font-mono"
                                    />
                                    <datalist id="known-device-ids">
                                        {KNOWN_DEVICE_IDS.map(d => (
                                            <option key={d} value={d}>{d}</option>
                                        ))}
                                    </datalist>
                                    {username && DEFAULT_DEVICE_BY_USERNAME[username] && (
                                        <p className="text-xs text-slate-600 mt-1">
                                            "{username}" 계정의 기본 등록 기기:
                                            <span className="font-mono text-police-700">
                                                {" " + DEFAULT_DEVICE_BY_USERNAME[username]}
                                            </span>
                                        </p>
                                    )}
                                </div>

                                <div>
                                    <label className="block text-sm font-medium text-slate-700 mb-2">
                                        위치 (시뮬레이션)
                                    </label>
                                    <select
                                        value={sim.location}
                                        onChange={(e) => sim.setLocation(e.target.value)}
                                        className="w-full bg-white border border-slate-200 rounded px-3 py-2 text-slate-900"
                                    >
                                        <option>본청</option>
                                        <option>강남서</option>
                                        <option>판교센터</option>
                                        <option>동대문서</option>
                                        <option>은평서</option>
                                        <option>해외</option>
                                        <option>비허용위치</option>
                                    </select>
                                </div>

                                {auth.error && (
                                    <div className="bg-red-50 border border-red-300 p-3 rounded text-red-800 text-sm">
                                        {auth.error}
                                        {auth.errorCode === 'device_not_registered' && (
                                            <div className="mt-2 pt-2 border-t border-red-300/50 text-xs text-red-800">
                                                💡 <b>device_id 가 등록되어 있지 않습니다.</b><br/>
                                                관리자가 계정 생성 시 알려준 <span className="font-mono">registered-new-NNN</span> 형식의
                                                값을 그대로 입력하세요. 신규 계정은 자동발급된 device_id 외에는
                                                로그인이 차단됩니다.
                                            </div>
                                        )}
                                        {auth.errorCode === 'device_required' && (
                                            <div className="mt-2 pt-2 border-t border-red-300/50 text-xs text-red-800">
                                                💡 device_id 칸이 비어 있습니다. 관리자에게서 받은 값을 입력하세요.
                                            </div>
                                        )}
                                    </div>
                                )}

                                <button
                                    type="submit"
                                    disabled={auth.loading}
                                    className="w-full bg-police-600 hover:bg-police-700 disabled:opacity-50 text-white font-semibold py-2 rounded transition"
                                >
                                    {auth.loading ? '로그인 중...' : '로그인'}
                                </button>
                            </form>
                        ) : (
                          (auth.mfaMeta && auth.mfaMeta.adminGated && !auth.mfaMeta.hasTokenDevice) ? (
                            // patrol_jung 같이 토큰 기기가 없는 계정:
                            // 관리자의 로그인 승인 자체가 2차 인증(MFA)을 대체한다.
                            <form onSubmit={handleMfaSubmit} className="space-y-4">
                                <div className="bg-amber-50 border border-amber-300 p-3 rounded text-amber-800 text-sm mb-2">
                                    이 계정은 <b>토큰 기기가 등록되어 있지 않습니다</b>.<br/>
                                    <b>관리자의 명시적 로그인 승인</b>이 MFA 를 대체합니다.
                                </div>
                                <div className="bg-white rounded p-3 text-xs font-mono text-slate-700">
                                    사용자: {username || '—'}<br/>
                                    기기: {sim.deviceId || '—'}<br/>
                                    위치: {sim.location || '—'}<br/>
                                    인증 방식: <span className="text-amber-700">관리자 승인 기반 MFA 우회</span>
                                </div>

                                {auth.error && (
                                    <div className="bg-red-50 border border-red-300 p-3 rounded text-red-800 text-sm">
                                        {auth.error}
                                        {auth.errorCode === 'device_not_registered' && (
                                            <div className="mt-2 pt-2 border-t border-red-300/50 text-xs text-red-800">
                                                💡 <b>device_id 가 등록되어 있지 않습니다.</b><br/>
                                                관리자가 계정 생성 시 알려준 <span className="font-mono">registered-new-NNN</span> 형식의
                                                값을 그대로 입력하세요. 신규 계정은 자동발급된 device_id 외에는
                                                로그인이 차단됩니다.
                                            </div>
                                        )}
                                        {auth.errorCode === 'device_required' && (
                                            <div className="mt-2 pt-2 border-t border-red-300/50 text-xs text-red-800">
                                                💡 device_id 칸이 비어 있습니다. 관리자에게서 받은 값을 입력하세요.
                                            </div>
                                        )}
                                    </div>
                                )}

                                <button
                                    type="submit"
                                    disabled={auth.loading}
                                    className="w-full bg-amber-600 hover:bg-amber-500 disabled:opacity-50 text-slate-900 font-semibold py-2 rounded transition"
                                >
                                    {auth.loading ? '인증 중...' : '관리자 승인으로 인증 완료'}
                                </button>

                                <button
                                    type="button"
                                    onClick={() => {
                                        auth.logout();
                                        setOtpCode('');
                                    }}
                                    className="w-full bg-slate-50 hover:bg-slate-100 text-slate-900 font-semibold py-2 rounded transition"
                                >
                                    취소
                                </button>
                            </form>
                          ) : (
                            <form onSubmit={handleMfaSubmit} className="space-y-4">
                                <div className="bg-police-50 border border-police-600 p-3 rounded text-police-800 text-sm mb-4">
                                    다단계 인증(MFA)이 필요합니다. 6자리 숫자를 입력하세요.
                                </div>

                                <div>
                                    <label className="block text-sm font-medium text-slate-700 mb-2">
                                        OTP 코드
                                    </label>
                                    <input
                                        type="text"
                                        value={otpCode}
                                        onChange={(e) => setOtpCode(e.target.value.replace(/\D/g, '').slice(0, 6))}
                                        maxLength="6"
                                        className="w-full bg-white border border-slate-200 rounded px-3 py-2 text-slate-900 placeholder-slate-400 text-center text-2xl tracking-widest"
                                        placeholder="000000"
                                        disabled={auth.loading}
                                    />
                                </div>

                                <div className="text-xs text-slate-600 mb-2">
                                    인증 기기: <span className="font-mono text-police-700">{sim.deviceId || '(미지정)'}</span>
                                </div>
                                <button
                                    type="button"
                                    onClick={() => requestDeviceOtp()}
                                    className="w-full bg-green-700 hover:bg-green-600 text-white font-semibold py-2 rounded transition text-sm"
                                >
                                    📩 토큰 기기에 알림 전송
                                </button>
                                <p className="text-xs text-slate-500">
                                    OTP 코드는 토큰 기기 앱이 30초 주기로 자동 갱신·표시합니다.
                                    이 버튼은 토큰 기기 앱 창에 "로그인 시도 알림" 을 띄우는 역할입니다 —
                                    토큰 기기 앱(apps/virtual_device.py) 창의 현재 6자리 코드를 위 입력칸에 입력하세요.
                                    한 번 사용한 코드는 재사용할 수 없습니다 (RFC 6238 §5.2).
                                </p>
                                {otpMessage && (
                                    <div className="bg-green-50 border border-green-300 p-3 rounded text-green-800 text-sm">
                                        {otpMessage}
                                    </div>
                                )}

                                {auth.error && (
                                    <div className="bg-red-50 border border-red-300 p-3 rounded text-red-800 text-sm">
                                        {auth.error}
                                        {auth.errorCode === 'device_not_registered' && (
                                            <div className="mt-2 pt-2 border-t border-red-300/50 text-xs text-red-800">
                                                💡 <b>device_id 가 등록되어 있지 않습니다.</b><br/>
                                                관리자가 계정 생성 시 알려준 <span className="font-mono">registered-new-NNN</span> 형식의
                                                값을 그대로 입력하세요. 신규 계정은 자동발급된 device_id 외에는
                                                로그인이 차단됩니다.
                                            </div>
                                        )}
                                        {auth.errorCode === 'device_required' && (
                                            <div className="mt-2 pt-2 border-t border-red-300/50 text-xs text-red-800">
                                                💡 device_id 칸이 비어 있습니다. 관리자에게서 받은 값을 입력하세요.
                                            </div>
                                        )}
                                    </div>
                                )}

                                <button
                                    type="submit"
                                    disabled={auth.loading || otpCode.length !== 6}
                                    className="w-full bg-police-600 hover:bg-police-700 disabled:opacity-50 text-white font-semibold py-2 rounded transition"
                                >
                                    {auth.loading ? '인증 중...' : '인증'}
                                </button>

                                <button
                                    type="button"
                                    onClick={() => {
                                        auth.logout();
                                        setOtpCode('');
                                    }}
                                    className="w-full bg-slate-50 hover:bg-slate-100 text-slate-900 font-semibold py-2 rounded transition"
                                >
                                    뒤로 가기
                                </button>
                            </form>
                          )
                        )}
                    </div>
                </div>
            );
        }

        // ============ DASHBOARD PAGE ============
        function DashboardPage() {
            const auth = useContext(AuthContext);
            const [stats, setStats] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                if (!auth.token) return;

                const fetchDashboard = async () => {
                    try {
                        const response = await fetch('/api/audit/dashboard', {
                            headers: { 'Authorization': `Bearer ${auth.token}` }
                        });
                        if (response.ok) {
                            setStats(await response.json());
                        }
                    } catch (err) {
                        console.error('Dashboard fetch error:', err);
                    } finally {
                        setLoading(false);
                    }
                };

                fetchDashboard();
            }, [auth.token]);

            if (loading) return <LoadingSpinner />;
            if (!stats) return <div className="text-center text-slate-600">데이터를 로드할 수 없습니다</div>;

            return (
                <div className="space-y-6">
                    <h2 className="text-3xl font-bold">대시보드</h2>

                    {/* Stats Cards */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
                        <div className="glass-card p-4 rounded-lg">
                            <p className="text-slate-600 text-sm mb-1">총 접근 요청</p>
                            <p className="text-3xl font-bold text-police-600">{stats.total_access_requests || 0}</p>
                        </div>
                        <div className="glass-card p-4 rounded-lg">
                            <p className="text-slate-600 text-sm mb-1">차단 건수</p>
                            <p className="text-3xl font-bold text-red-600">{stats.blocked_count || 0}</p>
                        </div>
                        <div className="glass-card p-4 rounded-lg">
                            <p className="text-slate-600 text-sm mb-1">재인증 요청</p>
                            <p className="text-3xl font-bold text-amber-600">{stats.reauth_count || 0}</p>
                        </div>
                        <div className="glass-card p-4 rounded-lg">
                            <p className="text-slate-600 text-sm mb-1">승인 대기</p>
                            <p className="text-3xl font-bold text-purple-600">{stats.pending_approvals || 0}</p>
                        </div>
                        <div className="glass-card p-4 rounded-lg">
                            <p className="text-slate-600 text-sm mb-1">활성 세션</p>
                            <p className="text-3xl font-bold text-green-600">{stats.active_sessions || 0}</p>
                        </div>
                    </div>

                    {/* Decision Distribution */}
                    <div className="glass-card p-6 rounded-lg">
                        <h3 className="text-xl font-bold mb-4">결정 분포</h3>
                        <div className="space-y-3">
                            {stats.decision_distribution && stats.decision_distribution.map((item, idx) => (
                                <div key={idx} className="flex items-center gap-4">
                                    <span className="w-32 text-sm font-medium">{item.decision_label || `레벨 ${item.decision_level}`}</span>
                                    <div className="flex-1 h-6 bg-white rounded overflow-hidden">
                                        <div
                                            className="h-full bg-police-600"
                                            style={{ width: `${(item.cnt / (stats.total_access_requests || 1)) * 100}%` }}
                                        />
                                    </div>
                                    <span className="w-12 text-right font-semibold">{item.cnt}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Grade Statistics */}
                    {stats.grade_stats && stats.grade_stats.length > 0 && (
                        <div className="glass-card p-6 rounded-lg">
                            <h3 className="text-xl font-bold mb-4">등급별 통계</h3>
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm">
                                    <thead>
                                        <tr className="border-b border-slate-200">
                                            <th className="text-left py-2 px-4">등급</th>
                                            <th className="text-right py-2 px-4">전체 요청</th>
                                            <th className="text-right py-2 px-4">승인</th>
                                            <th className="text-right py-2 px-4">차단</th>
                                            <th className="text-right py-2 px-4">승인율</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {stats.grade_stats.map((item, idx) => (
                                            <tr key={idx} className="border-b border-slate-200">
                                                <td className="py-3 px-4">
                                                    <GradeBadge grade={item.sensitivity_grade} />
                                                </td>
                                                <td className="text-right py-3 px-4">{item.cnt || 0}</td>
                                                <td className="text-right py-3 px-4 text-green-600">{item.allowed || 0}</td>
                                                <td className="text-right py-3 px-4 text-red-600">{item.blocked || 0}</td>
                                                <td className="text-right py-3 px-4 font-semibold">
                                                    {item.cnt > 0 ? Math.round((item.allowed / item.cnt) * 100) : 0}%
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ============ CASE LIST PAGE ============
        function CaseListPage() {
            const auth = useContext(AuthContext);
            const sim = useContext(SimulationContext);
            const [cases, setCases] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedGrade, setSelectedGrade] = useState(null);
            const [currentPage, setCurrentPage] = useState('case-list');
            const [pendingRestrictedCase, setPendingRestrictedCase] = useState(null);
            const [assignmentRequestLoading, setAssignmentRequestLoading] = useState(false);
            const [assignmentRequestResult, setAssignmentRequestResult] = useState(null);
            const [assignmentRequestData, setAssignmentRequestData] = useState(null);
            const [assignmentOtp, setAssignmentOtp] = useState('');
            const [assignmentOtpLoading, setAssignmentOtpLoading] = useState(false);
            const [myAssignmentRequests, setMyAssignmentRequests] = useState([]);
            const [activeOtpRequest, setActiveOtpRequest] = useState(null);
            const [activeOtpPopupOpen, setActiveOtpPopupOpen] = useState(false);
            const [activeOtp, setActiveOtp] = useState('');
            const [activeOtpLoading, setActiveOtpLoading] = useState(false);

            const closeAssignmentModal = () => {
                setPendingRestrictedCase(null);
                setAssignmentRequestResult(null);
                setAssignmentRequestData(null);
                setAssignmentOtp('');
            };

            const recordRestrictedCaseClick = async (caseItem) => {
                try {
                    await fetch(`/api/resources/cases/${caseItem.id}/restricted-click`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${auth.token}`,
                            'X-Device-Id': encodeURIComponent(sim.deviceId || ''),
                            'X-Location': encodeURIComponent(sim.location || ''),
                            ...(sim.simHour != null && { 'X-Sim-Hour': String(sim.simHour) }),
                        },
                    });
                } catch (err) {
                    console.error('Restricted case click record error:', err);
                }
            };

            const openCaseFromList = (caseItem) => {
                if (!caseItem.is_assigned_case) {
                    recordRestrictedCaseClick(caseItem);
                    setPendingRestrictedCase(caseItem);
                    setAssignmentRequestResult(null);
                    setAssignmentRequestData(null);
                    setAssignmentOtp('');
                    return;
                }
                window.location.hash = `#case-detail/${caseItem.id}`;
            };

            const loadCases = async () => {
                try {
                    const response = await fetch('/api/resources/cases', {
                        headers: {
                            'Authorization': `Bearer ${auth.token}`,
                            'X-Device-Id': encodeURIComponent(sim.deviceId || ''),
                            'X-Location': encodeURIComponent(sim.location || ''),
                            ...(sim.simHour != null && { 'X-Sim-Hour': String(sim.simHour) }),
                        }
                    });
                    if (response.ok) {
                        const data = await response.json();
                        setCases(data.cases || []);
                    }
                } catch (err) {
                    console.error('Cases fetch error:', err);
                }
            };

            const requestCaseAssignment = async () => {
                if (!pendingRestrictedCase || assignmentRequestLoading) return;
                setAssignmentRequestLoading(true);
                setAssignmentRequestResult(null);
                try {
                    const response = await fetch(`/api/resources/cases/${pendingRestrictedCase.id}/assignment-request`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${auth.token}`,
                            'Content-Type': 'application/json',
                            'X-Device-Id': encodeURIComponent(sim.deviceId || ''),
                            'X-Location': encodeURIComponent(sim.location || ''),
                        },
                        body: JSON.stringify({
                            reason: '비담당 사건 목록에서 담당 사건 등록 요청'
                        })
                    });
                    const data = await response.json().catch(() => ({}));
                    if (!response.ok) {
                        setAssignmentRequestResult({
                            ok: false,
                            message: data.message || data.error || '담당 사건 등록 요청 실패',
                            scope: data.assignment_scope || null,
                        });
                        return;
                    }
                    const req = data.assignment_request || null;
                    setAssignmentRequestData(req);
                    setAssignmentRequestResult({
                        ok: true,
                        message: data.message || (
                            req?.status === 'otp_required'
                                ? '관리자가 OTP 인증을 요구했습니다. 아래에 OTP 코드를 입력하세요.'
                                : '담당 사건 등록 요청을 보냈습니다. 관리자 승인을 기다려 주세요.'
                        )
                    });
                    setTimeout(() => fetchMyAssignmentRequests(), 300);
                } catch (err) {
                    setAssignmentRequestResult({
                        ok: false,
                        message: err.message || '담당 사건 등록 요청 실패',
                        scope: null,
                    });
                } finally {
                    setAssignmentRequestLoading(false);
                }
            };

            const verifyAssignmentOtp = async () => {
                if (!assignmentRequestData || assignmentOtpLoading) return;
                if (!/^\d{6}$/.test(assignmentOtp.trim())) {
                    setAssignmentRequestResult({ ok: false, message: '6자리 OTP 코드를 입력하세요.' });
                    return;
                }
                setAssignmentOtpLoading(true);
                try {
                    const response = await fetch(`/api/resources/case-assignment-requests/${assignmentRequestData.id}/verify-otp`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${auth.token}`,
                            'Content-Type': 'application/json',
                            'X-Device-Id': encodeURIComponent(sim.deviceId || ''),
                            'X-Location': encodeURIComponent(sim.location || ''),
                        },
                        body: JSON.stringify({ otp: assignmentOtp.trim() })
                    });
                    const data = await response.json().catch(() => ({}));
                    if (!response.ok) {
                        throw new Error(data.message || data.error || 'OTP 인증 실패');
                    }
                    setAssignmentRequestData(data.assignment_request || assignmentRequestData);
                    setAssignmentRequestResult({
                        ok: true,
                        message: data.message || 'OTP 인증이 완료되었습니다. 관리자 최종 승인을 기다려 주세요.'
                    });
                    setAssignmentOtp('');
                } catch (err) {
                    setAssignmentRequestResult({ ok: false, message: err.message || 'OTP 인증 실패' });
                } finally {
                    setAssignmentOtpLoading(false);
                }
            };

            const fetchMyAssignmentRequests = async () => {
                if (!auth.token) return;
                try {
                    const response = await fetch('/api/resources/case-assignment-requests/my', {
                        headers: { 'Authorization': `Bearer ${auth.token}` }
                    });
                    if (response.ok) {
                        const data = await response.json();
                        const requests = data.requests || [];
                        setMyAssignmentRequests(requests);
                        const otpReq = requests.find(r => r.status === 'otp_required');

                        // 관리자가 다른 브라우저에서 OTP 인증 요구를 누르면
                        // 요청자 화면에 즉시 팝업이 뜨도록 상태를 갱신한다.
                        setActiveOtpRequest(prev => {
                            if (otpReq) {
                                if (!prev || prev.id !== otpReq.id) {
                                    setActiveOtp('');
                                }
                                setActiveOtpPopupOpen(true);
                                return otpReq;
                            }
                            setActiveOtpPopupOpen(false);
                            return null;
                        });

                        // 관리자 최종 승인 후 assigned_cases가 바뀌면 새로고침 없이
                        // 담당 사건 컬러/마스킹 해제가 반영되도록 목록도 함께 재조회한다.
                        await loadCases();
                    }
                } catch (err) {
                    console.error('My assignment requests fetch error:', err);
                }
            };

            const verifyActiveAssignmentOtp = async () => {
                if (!activeOtpRequest || activeOtpLoading) return;
                if (!/^\d{6}$/.test(activeOtp.trim())) {
                    setAssignmentRequestResult({ ok: false, message: '6자리 OTP 코드를 입력하세요.' });
                    return;
                }
                setActiveOtpLoading(true);
                try {
                    const response = await fetch(`/api/resources/case-assignment-requests/${activeOtpRequest.id}/verify-otp`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${auth.token}`,
                            'Content-Type': 'application/json',
                            'X-Device-Id': encodeURIComponent(sim.deviceId || ''),
                            'X-Location': encodeURIComponent(sim.location || ''),
                        },
                        body: JSON.stringify({ otp: activeOtp.trim() })
                    });
                    const data = await response.json().catch(() => ({}));
                    if (!response.ok) {
                        throw new Error(data.message || data.error || 'OTP 인증 실패');
                    }
                    setActiveOtp('');
                    setActiveOtpRequest(null);
                    setActiveOtpPopupOpen(false);
                    setAssignmentRequestResult({ ok: true, message: data.message || 'OTP 인증이 완료되었습니다. 관리자 최종 승인을 기다려 주세요.' });
                    await fetchMyAssignmentRequests();
                    await loadCases();
                } catch (err) {
                    setAssignmentRequestResult({ ok: false, message: err.message || 'OTP 인증 실패' });
                } finally {
                    setActiveOtpLoading(false);
                }
            };

            useEffect(() => {
                if (!auth.token) return;
                fetchMyAssignmentRequests();

                const iv = setInterval(fetchMyAssignmentRequests, 1000);
                const onFocus = () => fetchMyAssignmentRequests();
                const onVisibility = () => {
                    if (!document.hidden) fetchMyAssignmentRequests();
                };

                window.addEventListener('focus', onFocus);
                document.addEventListener('visibilitychange', onVisibility);

                return () => {
                    clearInterval(iv);
                    window.removeEventListener('focus', onFocus);
                    document.removeEventListener('visibilitychange', onVisibility);
                };
            }, [auth.token, sim.deviceId, sim.location, sim.simHour]);

            useEffect(() => {
                if (!auth.token) return;
                const run = async () => {
                    setLoading(true);
                    await loadCases();
                    setLoading(false);
                };
                run();
            }, [auth.token, sim.deviceId, sim.location, sim.simHour]);

            const filteredCases = selectedGrade
                ? cases.filter(c => c.is_assigned_case && c.sensitivity_grade === selectedGrade)
                : cases;

            if (loading) return <LoadingSpinner />;

            return (
                <div className="space-y-6">
                    <h2 className="text-3xl font-bold">사건 목록</h2>

                    {/* Grade Filter */}
                    <div className="flex gap-2 flex-wrap">
                        <button
                            onClick={() => setSelectedGrade(null)}
                            className={`px-4 py-2 rounded font-semibold transition ${
                                selectedGrade === null
                                    ? 'bg-police-600 text-white'
                                    : 'bg-white text-slate-700 hover:bg-slate-50'
                            }`}
                        >
                            전체
                        </button>
                        {[1, 2, 3, 4, 5].map(grade => (
                            <button
                                key={grade}
                                onClick={() => setSelectedGrade(grade)}
                                className={`px-4 py-2 rounded font-semibold transition ${
                                    selectedGrade === grade
                                        ? 'bg-police-600 text-white'
                                        : 'bg-white text-slate-700 hover:bg-slate-50'
                                }`}
                            >
                                Grade {grade}
                            </button>
                        ))}
                    </div>

                    {/* Cases Grid */}
                    {filteredCases.length === 0 ? (
                        <div className="text-center text-slate-600 py-8">
                            해당 등급의 담당 사건이 없습니다
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {filteredCases.map(caseItem => {
                                const masked = !caseItem.is_assigned_case;
                                return (
                                    <div
                                        key={caseItem.id}
                                        onClick={() => openCaseFromList(caseItem)}
                                        className={`glass-card p-6 rounded-lg cursor-pointer transition border border-slate-200 ${masked ? 'case-card-restricted hover:border-slate-400' : 'hover:border-police-600'}`}
                                    >
                                        <div className="flex items-start justify-between gap-3 mb-3">
                                            <div className="flex-1 min-w-0">
                                                <div className="flex items-center gap-2 mb-2">
                                                    {masked && (
                                                        <span className="text-xs px-2 py-1 rounded-full restricted-note font-semibold">비담당 사건</span>
                                                    )}
                                                    {!masked && (
                                                        <span className="text-xs px-2 py-1 rounded-full bg-green-50 text-green-700 font-semibold border border-green-200">담당 사건</span>
                                                    )}
                                                </div>
                                                <h3 className="text-lg font-bold flex-1">{caseItem.title}</h3>
                                            </div>
                                            <GradeBadge grade={caseItem.sensitivity_grade} masked={masked} />
                                        </div>

                                        <div className="text-sm text-slate-600 space-y-2">
                                            <p className={masked ? 'blur-strong' : ''}>사건번호: <span className="text-slate-700">{caseItem.case_number}</span></p>
                                            <p className={masked ? 'blur-strong' : ''}>자료유형: <span className="text-slate-700">{caseItem.data_type}</span></p>
                                            <p className={masked ? 'blur-strong' : ''}>부서: <span className="text-slate-700">{caseItem.department}</span></p>
                                            <p className={`text-sm leading-relaxed ${masked ? 'blur-strong' : 'text-slate-500'}`}>{caseItem.description || '설명 없음'}</p>
                                        </div>

                                        {masked && (
                                            <div className="mt-4 text-xs text-slate-500 bg-slate-100 border border-slate-200 rounded-lg px-3 py-2">
                                                상세 정보는 마스킹되어 있으며, 클릭 시 접근 평가 후 열람 가능 여부가 결정됩니다.
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {activeOtpPopupOpen && activeOtpRequest && (
                        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-[80] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl shadow-2xl max-w-lg w-full border border-amber-200 overflow-hidden slide-enter">
                                <div className="bg-amber-600 text-white px-6 py-4">
                                    <div className="flex items-center gap-3">
                                        <span className="text-2xl">🔐</span>
                                        <div>
                                            <h3 className="text-xl font-bold">OTP 재인증 필요</h3>
                                            <p className="text-amber-100 text-sm mt-1">관리자가 담당 사건 등록 요청에 대해 OTP 인증을 요구했습니다.</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="p-6 space-y-4">
                                    <div className="bg-amber-50 border border-amber-200 rounded-lg p-4 text-sm text-amber-900 leading-relaxed">
                                        <p>
                                            요청 사건: <span className="font-semibold">{activeOtpRequest.resource_title}</span>
                                        </p>
                                        <p className="mt-1">
                                            OTP 인증을 완료하면 관리자 패널에서 <span className="font-semibold">최종 승인 / 담당 등록</span> 버튼이 활성화됩니다.
                                        </p>
                                    </div>

                                    <div className="flex gap-2">
                                        <input
                                            type="text"
                                            value={activeOtp}
                                            onChange={(e) => setActiveOtp(e.target.value.replace(/\D/g, '').slice(0, 6))}
                                            placeholder="6자리 OTP"
                                            className="flex-1 px-3 py-2 border border-amber-300 rounded text-sm font-mono"
                                            maxLength="6"
                                            autoFocus
                                        />
                                        <button
                                            onClick={verifyActiveAssignmentOtp}
                                            disabled={activeOtpLoading || activeOtp.length !== 6}
                                            className="px-4 py-2 rounded bg-amber-600 text-white text-sm font-semibold hover:bg-amber-700 disabled:opacity-50 disabled:cursor-not-allowed"
                                        >
                                            {activeOtpLoading ? '인증 중...' : 'OTP 인증'}
                                        </button>
                                    </div>
                                </div>

                                <div className="px-6 py-4 bg-slate-50 flex justify-end gap-3 border-t border-slate-200">
                                    <button
                                        onClick={() => setActiveOtpPopupOpen(false)}
                                        className="px-4 py-2 rounded-lg bg-white border border-slate-300 text-slate-700 font-semibold hover:bg-slate-100 transition"
                                    >
                                        나중에 인증
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {pendingRestrictedCase && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl shadow-2xl max-w-lg w-full border border-slate-200 overflow-hidden slide-enter">
                                <div className="bg-slate-900 text-white px-6 py-4">
                                    <div className="flex items-center justify-between gap-3">
                                        <div className="flex items-center gap-3">
                                        <span className="text-2xl">⚠️</span>
                                        <div>
                                            <h3 className="text-xl font-bold">담당 사건 등록 요청</h3>
                                            <p className="text-slate-300 text-sm mt-1">관리자 승인 전 재확인이 필요합니다.</p>
                                        </div>
                                        </div>
                                        <button
                                            onClick={closeAssignmentModal}
                                            className="text-slate-300 hover:text-white text-2xl leading-none px-2"
                                            aria-label="닫기"
                                        >
                                            ×
                                        </button>
                                    </div>
                                </div>

                                <div className="p-6 space-y-4">
                                    <div className="restricted-note rounded-lg p-4 text-sm leading-relaxed">
                                        <p className="font-semibold text-slate-800 mb-2">이 문서는 현재 사용자의 담당 사건으로 등록되어 있지 않습니다.</p>
                                        <p>
                                            담당 사건으로 등록하려면 관리자 승인이 필요합니다. 관리자가 인증을 요구하면 요청자는 OTP로 본인 인증을 진행하고, 이후 관리자가 최종 승인합니다.
                                        </p>
                                    </div>

                                    <div className="bg-red-50 border border-red-200 text-red-800 rounded-lg p-4 text-sm leading-relaxed">
                                        관리자 계정이 직접 요청한 경우에는 자기 승인 방지를 위해 부관리자에게 승인 요청이 전달됩니다.
                                    </div>

                                    <div className="bg-slate-50 border border-slate-200 rounded-lg p-4 text-sm text-slate-600">
                                        <p>대상: <span className="font-semibold text-slate-800">{pendingRestrictedCase.title}</span></p>
                                        <p>상태: 사건명 표시, 사건번호/등급/세부 내용 마스킹 적용</p>
                                    </div>
                                </div>

                                {assignmentRequestResult && (
                                    <div className={`mx-6 mb-4 rounded-lg px-4 py-3 text-sm border ${assignmentRequestResult.ok ? 'bg-green-50 border-green-200 text-green-800' : 'bg-red-50 border-red-200 text-red-800'}`}>
