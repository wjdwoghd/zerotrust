            const [brPending, setBrPending] = useState([]);
            const [brHistory, setBrHistory] = useState([]);
            const [loading, setLoading] = useState(true);
            const [tab, setTab] = useState('approvals');
            const { toasts, addToast } = useToast();

            const DEPARTMENT_OPTIONS = [
                '강력범죄수사대', '사이버수사대', '교통과',
                '생활안전과', '정보보안과', '감사팀',
            ];
            const RANK_OPTIONS = [
                '순경', '경장', '경사', '경위', '경감', '형사', '수사관',
            ];
            const LOCATION_OPTIONS = [
                '본청', '강남서', '판교센터', '동대문서', '은평서', '해외',
            ];
            const JOB_SCOPE_OPTIONS = [
                { value: 'violent_crime', label: '강력범죄' },
                { value: 'drug', label: '마약' },
                { value: 'organized_crime', label: '조직범죄' },
                { value: 'cyber', label: '사이버' },
                { value: 'forensic', label: '포렌식' },
                { value: 'traffic', label: '교통' },
                { value: 'national_security', label: '안보' },
                { value: 'patrol', label: '생활안전/순찰' },
                { value: 'infosec', label: '정보보안' },
                { value: 'audit', label: '감사' },
            ];

            // #20 신규 계정 프로비저닝 모달
            const [createOpen, setCreateOpen] = useState(false);
            const emptyCreateForm = {
                username: '', password: '', passwordConfirm: '',
                name: '', department: '', rank: '',
                locations: [], jobScope: [],
            };
            const [createForm, setCreateForm] = useState(emptyCreateForm);
            const [createSubmitting, setCreateSubmitting] = useState(false);
            const [createError, setCreateError] = useState('');
            // #27 — 계정 생성 직후 자동발급된 device_id 를 관리자가 잃어버리지 않도록
            //       3초 토스트가 아니라 영구 확인 모달로 표시한다.
            //       (이전: 토스트가 사라지면 관리자가 device_id 를 모르므로
            //        사용자가 잘못된 device_id 로 로그인 → device_not_registered 실패)
            const [createdInfo, setCreatedInfo] = useState(null);

            // 허용 위치(allowed_locations) 편집 모달
            //   - 권한 매트릭스: admin↔user/deputy_admin, deputy_admin↔admin
            //   - 자기 자신 편집 금지
            //   - 위치 옵션은 시뮬 패널과 동일 6종 (좌표 등록된 정상 위치)
            //     "비허용위치" 는 정책상 차단 라벨이므로 옵션에서 제외.
            const [locOpen, setLocOpen] = useState(false);
            const [locTarget, setLocTarget] = useState(null);
            const [locSelected, setLocSelected] = useState([]);
            const [locBusy, setLocBusy] = useState(false);
            const [locError, setLocError] = useState('');

            useEffect(() => {
                if (!auth.token) return;
                setLoading(true);

                const fetchData = async () => {
                    try {
                        if (tab === 'approvals') {
                            const response = await fetch('/api/admin/approvals/pending', {
                                headers: { 'Authorization': `Bearer ${auth.token}` }
                            });
                            if (response.ok) {
                                const data = await response.json();
                                setApprovals(data.approvals || []);
                            }
                        } else if (tab === 'caseAssignments') {
                            const response = await fetch('/api/admin/case-assignment-requests/pending', {
                                headers: { 'Authorization': `Bearer ${auth.token}` }
                            });
                            if (response.ok) {
                                const data = await response.json();
                                setCaseAssignmentRequests(data.requests || []);
                            }
                        } else if (tab === 'users') {
                            const response = await fetch('/api/admin/users', {
                                headers: { 'Authorization': `Bearer ${auth.token}` }
                            });
                            if (response.ok) {
                                const data = await response.json();
                                setUsers(data.users || []);
                            }
                        } else if (tab === 'loginApprovals') {
                            // 두 리스트를 병렬 조회
                            const [pRes, hRes] = await Promise.all([
                                fetch('/api/admin/login-approvals/pending', {
                                    headers: { 'Authorization': `Bearer ${auth.token}` }
                                }),
                                fetch('/api/admin/login-approvals/history', {
                                    headers: { 'Authorization': `Bearer ${auth.token}` }
                                }),
                            ]);
                            if (pRes.ok) {
                                const pd = await pRes.json();
                                setBgPending(pd.requests || []);
                            }
                            if (hRes.ok) {
                                const hd = await hRes.json();
                                setBgHistory(hd.requests || []);
                            }
                        } else if (tab === 'breakGlass') {
                            // Phase 2 — Break-Glass 리뷰 대기 + 전체 이력
                            const [pRes, hRes] = await Promise.all([
                                fetch('/api/admin/break-glass/pending', {
                                    headers: { 'Authorization': `Bearer ${auth.token}` }
                                }),
                                fetch('/api/admin/break-glass/history?limit=100', {
                                    headers: { 'Authorization': `Bearer ${auth.token}` }
                                }),
                            ]);
                            if (pRes.ok) {
                                const pd = await pRes.json();
                                setBrPending(pd.activations || []);
                            }
                            if (hRes.ok) {
                                const hd = await hRes.json();
                                setBrHistory(hd.activations || []);
                            }
                        }
                    } catch (err) {
                        console.error('Admin data fetch error:', err);
                        addToast('데이터 로드 실패', 'error');
                    } finally {
                        setLoading(false);
                    }
                };

                fetchData();
                // 담당 사건 등록 / 로그인 승인 / BG 리뷰 탭에서는 10초 간격 자동 새로고침
                if (tab === 'caseAssignments' || tab === 'loginApprovals' || tab === 'breakGlass') {
                    const iv = setInterval(fetchData, 10000);
                    return () => clearInterval(iv);
                }
            }, [auth.token, tab]);

            // 로그인 승인 요청 승인 처리
            const handleBgApprove = async (reqId) => {
                try {
                    const res = await fetch(`/api/admin/login-approvals/${reqId}/approve`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${auth.token}` }
                    });
                    const data = await res.json();
                    if (res.ok) {
                        setBgPending(bgPending.filter(r => r.id !== reqId));
                        addToast(`관리자 로그인 승인 완료 (TTL ${Math.round((data.ttl_seconds||1800)/60)}분)`, 'success');
                    } else {
                        addToast(data.error || '승인 실패', 'error');
                    }
                } catch (err) {
                    addToast('요청 중 오류 발생', 'error');
                }
            };

            // 로그인 승인 요청 반려
            const handleBgReject = async (reqId, reason) => {
                try {
                    const res = await fetch(`/api/admin/login-approvals/${reqId}/reject`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${auth.token}`
                        },
                        body: JSON.stringify({ reason: reason || '반려' })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        setBgPending(bgPending.filter(r => r.id !== reqId));
                        addToast('로그인 승인 반려 완료', 'warning');
                    } else {
                        addToast(data.error || '반려 실패', 'error');
                    }
                } catch (err) {
                    addToast('요청 중 오류 발생', 'error');
                }
            };

            // ─── Phase 2 Break-Glass: 리뷰/회수 ────────────────────────
            const reloadBrTab = async () => {
                try {
                    const [pRes, hRes] = await Promise.all([
                        fetch('/api/admin/break-glass/pending', {
                            headers: { 'Authorization': `Bearer ${auth.token}` }
                        }),
                        fetch('/api/admin/break-glass/history?limit=100', {
                            headers: { 'Authorization': `Bearer ${auth.token}` }
                        }),
                    ]);
                    if (pRes.ok) setBrPending((await pRes.json()).activations || []);
                    if (hRes.ok) setBrHistory((await hRes.json()).activations || []);
                } catch (e) { /* ignore */ }
            };

            const handleBrReview = async (activationId, verdict) => {
                const notes = prompt(
                    verdict === 'justified'
                        ? '정당 사유 확인 메모 (선택):'
                        : verdict === 'unjustified'
                            ? '부당 판정 사유 — 발동자의 trust_score 가 차감됩니다. 사유:'
                            : '부분 정당 사유 메모:',
                    ''
                );
                if (notes === null) return;
                try {
                    const res = await fetch(`/api/admin/break-glass/${activationId}/review`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${auth.token}`,
                        },
                        body: JSON.stringify({ verdict, notes }),
                    });
                    const data = await res.json();
                    if (res.ok) {
                        addToast(`리뷰 완료 (${verdict})`,
                            verdict === 'justified' ? 'success'
                            : verdict === 'unjustified' ? 'error' : 'warning');
                        await reloadBrTab();
                    } else {
                        addToast(data.error || '리뷰 실패', 'error');
                    }
                } catch (err) {
                    addToast('요청 중 오류 발생', 'error');
                }
            };

            const handleBrRevoke = async (activationId) => {
                const reason = prompt('즉시 강제 종료 사유 (감사 기록에 남습니다):', '');
                if (reason === null) return;
                try {
                    const res = await fetch(`/api/admin/break-glass/${activationId}/revoke`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${auth.token}`,
                        },
                        body: JSON.stringify({ reason }),
                    });
                    const data = await res.json();
                    if (res.ok) {
                        addToast('Break-Glass 강제 종료 완료', 'warning');
                        await reloadBrTab();
                    } else {
                        addToast(data.error || '회수 실패', 'error');
                    }
                } catch (err) {
                    addToast('요청 중 오류 발생', 'error');
                }
            };


            const reloadCaseAssignments = async () => {
                try {
                    const response = await fetch('/api/admin/case-assignment-requests/pending', {
                        headers: { 'Authorization': `Bearer ${auth.token}` }
                    });
                    if (response.ok) {
                        const data = await response.json();
                        setCaseAssignmentRequests(data.requests || []);
                    }
                } catch (err) {
                    addToast('담당 사건 등록 요청 로드 실패', 'error');
                }
            };

            const handleCaseAssignmentRequireOtp = async (requestId) => {
                if (!window.confirm('요청자에게 OTP 인증을 요구할까요?')) return;
                try {
                    const response = await fetch(`/api/admin/case-assignment-requests/${requestId}/require-otp`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${auth.token}` }
                    });
                    const data = await response.json().catch(() => ({}));
                    if (response.ok) {
                        addToast('요청자 OTP 인증을 요구했습니다', 'success');
                        await reloadCaseAssignments();
                    } else {
                        addToast(data.error || data.message || 'OTP 요구 실패', 'error');
                    }
                } catch (err) {
                    addToast('요청 중 오류 발생', 'error');
                }
            };

            const handleCaseAssignmentApprove = async (requestId) => {
                if (!window.confirm('이 사용자를 해당 사건의 담당자로 등록할까요?')) return;
                try {
                    const response = await fetch(`/api/admin/case-assignment-requests/${requestId}/approve`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${auth.token}` }
                    });
                    const data = await response.json().catch(() => ({}));
                    if (response.ok) {
                        addToast('담당 사건 등록 승인 완료', 'success');
                        await reloadCaseAssignments();
                    } else {
                        addToast(data.error || data.message || '승인 실패', 'error');
                    }
                } catch (err) {
                    addToast('요청 중 오류 발생', 'error');
                }
            };

            const handleCaseAssignmentReject = async (requestId) => {
                const reason = prompt('반려 사유를 입력하세요:', '반려');
                if (reason === null) return;
                try {
                    const response = await fetch(`/api/admin/case-assignment-requests/${requestId}/reject`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${auth.token}`
                        },
                        body: JSON.stringify({ reason })
                    });
                    const data = await response.json().catch(() => ({}));
                    if (response.ok) {
                        addToast('담당 사건 등록 요청 반려 완료', 'warning');
                        await reloadCaseAssignments();
                    } else {
                        addToast(data.error || data.message || '반려 실패', 'error');
                    }
                } catch (err) {
                    addToast('요청 중 오류 발생', 'error');
                }
            };

            const handleApprove = async (approvalId, downloadAllowed = false) => {
                try {
                    const response = await fetch(`/api/admin/approvals/${approvalId}/approve`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${auth.token}`,
                        },
                        body: JSON.stringify({ download_allowed: !!downloadAllowed }),
                    });
                    const data = await response.json();
                    if (response.ok) {
                        setApprovals(approvals.filter(a => a.id !== approvalId));
                        addToast(
                            downloadAllowed ? '승인 완료 (다운로드 허용)' : '승인 완료 (열람 전용)',
                            'success'
                        );
                    } else {
                        addToast(data.error || '승인 실패', 'error');
                    }
                } catch (err) {
                    addToast('요청 중 오류 발생', 'error');
                }
            };

            const handleReject = async (approvalId, reason) => {
                try {
                    const response = await fetch(`/api/admin/approvals/${approvalId}/reject`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${auth.token}`
                        },
                        body: JSON.stringify({ reason: reason || '거부됨' })
                    });
                    const data = await response.json();
                    if (response.ok) {
                        setApprovals(approvals.filter(a => a.id !== approvalId));
                        addToast('거부 완료', 'warning');
                    } else {
                        addToast(data.error || '거부 처리 실패', 'error');
                    }
                } catch (err) {
                    addToast('요청 중 오류 발생', 'error');
                }
            };

            const handleUnlock = async (userId) => {
                try {
                    const response = await fetch(`/api/admin/users/${userId}/unlock`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${auth.token}` }
                    });
                    if (response.ok) {
                        setUsers(users.map(u => u.id === userId ? { ...u, is_locked: 0 } : u));
                        addToast('계정 잠금 해제 완료', 'success');
                    } else {
                        addToast('잠금 해제 실패', 'error');
                    }
                } catch (err) {
                    addToast('요청 중 오류 발생', 'error');
                }
            };

            // #20 신규 계정 프로비저닝 (관리자 전용, role='user' 고정)
            const openCreateModal = () => {
                setCreateForm(emptyCreateForm);
                setCreateError('');
                setCreateOpen(true);
            };
            const closeCreateModal = () => {
                if (createSubmitting) return;
                setCreateOpen(false);
                setCreateError('');
            };
            const updateCreateField = (field, value) => {
                setCreateForm(prev => ({ ...prev, [field]: value }));
            };
            const toggleCreateMultiOption = (field, value) => {
                setCreateForm(prev => {
                    const cur = Array.isArray(prev[field]) ? prev[field] : [];
                    return {
                        ...prev,
                        [field]: cur.includes(value)
                            ? cur.filter(x => x !== value)
                            : [...cur, value],
                    };
                });
            };
            const handleCreateUser = async (e) => {
                if (e) e.preventDefault();
                setCreateError('');
                const f = createForm;

                // 클라이언트 1차 검증 (서버가 authoritative)
                if (!f.username.trim()) return setCreateError('사용자명을 입력하세요.');
                if (f.password.length < 11) return setCreateError('비밀번호는 11자 이상이어야 합니다.');
                if (f.password !== f.passwordConfirm) return setCreateError('비밀번호 확인이 일치하지 않습니다.');
                if (!f.name.trim()) return setCreateError('이름을 입력하세요.');
                if (!f.department) return setCreateError('소속 부서를 선택하세요.');
                if (!f.rank) return setCreateError('계급을 선택하세요.');

                const selectedLocations = Array.isArray(f.locations) ? f.locations : [];
                const locations = LOCATION_OPTIONS.filter(loc => selectedLocations.includes(loc));
                if (locations.length === 0) return setCreateError('허용 근무지를 최소 1개 선택하세요.');
                const selectedJobScope = Array.isArray(f.jobScope) ? f.jobScope : [];
                const jobScope = JOB_SCOPE_OPTIONS
                    .map(opt => opt.value)
                    .filter(value => selectedJobScope.includes(value));

                setCreateSubmitting(true);
                try {
                    const response = await fetch('/api/admin/users/create', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${auth.token}`,
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            username: f.username.trim(),
                            password: f.password,
                            name: f.name.trim(),
                            department: f.department,
                            rank: f.rank,
                            allowed_locations: locations,
                            job_scope: jobScope,
                        }),
                    });
                    const data = await response.json().catch(() => ({}));
                    if (response.ok) {
                        // 새 행을 리스트 끝에 추가 — 재조회 없이 즉시 반영
                        setUsers(prev => [...prev, data.user]);
                        // 폼은 비우되, 자동발급된 device_id / 임시 비밀번호를
                        // 관리자가 사용자에게 전달할 수 있도록 영구 모달로 표시.
                        // 모달을 닫기 전까지는 정보가 사라지지 않는다.
                        setCreatedInfo({
                            username: f.username.trim(),
                            password: f.password,
                            work_device_id: data.work_device_id || '',
                            login_path: data.login_path || 'admin_approval_gate',
                            message: data.message || '계정을 생성했습니다.',
                        });
                        setCreateOpen(false);
                        setCreateForm(emptyCreateForm);
                    } else {
                        setCreateError(data.error || data.message || '계정 생성 실패');
                    }
                } catch (err) {
                    setCreateError('요청 중 오류 발생');
                } finally {
                    setCreateSubmitting(false);
                }
            };

            // 허용 위치(allowed_locations) 편집 — 권한 매트릭스
            //   actor=admin/superadmin  →  user / deputy_admin 편집 가능
            //   actor=deputy_admin      →  admin / superadmin 편집 가능
            //   자기 자신은 불가
            const canEditLocations = (target) => {
                const actor = auth.user;
                if (!actor || !target) return false;
                if (actor.id === target.id) return false;
                const a = (actor.role || '').toLowerCase();
                const t = (target.role || '').toLowerCase();
                const ADMIN_LIKE = ['admin', 'superadmin'];
                const DEPUTY_LIKE = ['deputy_admin'];
                if (t === 'user' || DEPUTY_LIKE.includes(t)) return ADMIN_LIKE.includes(a);
                if (ADMIN_LIKE.includes(t)) return DEPUTY_LIKE.includes(a);
                return false;
            };

            const openLocModal = (user) => {
                setLocTarget(user);
                const cur = Array.isArray(user.allowed_locations)
                    ? user.allowed_locations
                    : (user.allowed_locations || []);
                // 옵션 풀에 있는 항목만 표시 (사전 좌표 등록 위치)
                setLocSelected(cur.filter(l => LOCATION_OPTIONS.includes(l)));
                setLocError('');
                setLocOpen(true);
            };
            const closeLocModal = () => {
                if (locBusy) return;
                setLocOpen(false);
                setLocTarget(null);
                setLocSelected([]);
                setLocError('');
            };
            const toggleLocOption = (loc) => {
                setLocSelected(prev =>
                    prev.includes(loc)
                        ? prev.filter(x => x !== loc)
                        : [...prev, loc]
                );
            };
            const handleSaveLocations = async (e) => {
                if (e && e.preventDefault) e.preventDefault();
                if (!locTarget) return;
                if (locSelected.length === 0) {
                    setLocError('허용 위치를 1개 이상 선택하세요.');
                    return;
                }
                // 옵션 풀 순서대로 정렬해 일관된 표시
                const ordered = LOCATION_OPTIONS.filter(l => locSelected.includes(l));
                setLocBusy(true);
                setLocError('');
                try {
                    const response = await fetch(
                        `/api/admin/users/${locTarget.id}/allowed_locations`,
                        {
                            method: 'PUT',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${auth.token}`,
                            },
                            body: JSON.stringify({ allowed_locations: ordered }),
                        }
                    );
                    const data = await response.json().catch(() => ({}));
                    if (response.ok) {
                        setUsers(users.map(u =>
                            u.id === locTarget.id
                                ? { ...u, allowed_locations: ordered }
                                : u
                        ));
                        addToast(`${locTarget.username} 허용 위치 갱신 완료`, 'success');
                        setLocOpen(false);
                        setLocTarget(null);
                        setLocSelected([]);
                    } else {
                        setLocError(data.error || data.message || '처리 실패');
                    }
                } catch (err) {
                    setLocError('요청 중 오류 발생');
                } finally {
                    setLocBusy(false);
                }
            };

            // #19 계정 활성/비활성 토글
            const handleToggleActive = async (user) => {
                const activating = !user.is_active;
                const url = activating
                    ? `/api/admin/users/${user.id}/activate`
                    : `/api/admin/users/${user.id}/deactivate`;
                const confirmMsg = activating
                    ? `${user.username} 계정을 활성화할까요?`
                    : `${user.username} 계정을 비활성화할까요?\n` +
                      `진행 중인 모든 세션이 즉시 축출되고, 이후 로그인이 차단됩니다.`;
                if (!window.confirm(confirmMsg)) return;
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${auth.token}` }
                    });
                    const data = await response.json().catch(() => ({}));
                    if (response.ok) {
                        setUsers(users.map(u =>
                            u.id === user.id ? { ...u, is_active: activating ? 1 : 0 } : u
                        ));
                        addToast(data.message || (activating ? '활성화 완료' : '비활성화 완료'),
                                 activating ? 'success' : 'warning');
                    } else {
                        // 서버가 설명적 메시지를 주면 그대로 노출 (self_deactivation_forbidden,
                        // last_active_admin 등). code 없이 떨어진 경우 기본 메시지.
                        addToast(data.error || data.message || '처리 실패', 'error');
                    }
                } catch (err) {
                    addToast('요청 중 오류 발생', 'error');
                }
            };

            // #20 (개정) 계정 하드 삭제
            //   DELETE /api/admin/users/<id> 호출. 백엔드가 종속 행
            //   (sessions/user_devices/otp_requests/login_approval_requests/
            //    access_logs/approvals/policy_override_requests/
            //    break_glass_activations) 을 선삭제 후 users 행 DELETE.
            //   감사 로그(audit_logs/sensitive_logs/operation_logs)는 보존되어
            //   사후 추적 가능. 복구 불가 — '활성화' 토글은 비활성 계정에만 적용.
            const handleDeleteUser = async (user) => {
                // 비가역 행동이므로 username 을 다시 입력하게 한다.
                const typed = window.prompt(
                    `${user.username} 계정을 완전히 삭제합니다.\n` +
                    `- 사용자 행과 모든 기기/세션/요청 기록이 DB 에서 제거됩니다.\n` +
                    `- 감사 로그(audit_logs)는 보존되어 사후 추적 가능합니다.\n` +
                    `- 이 작업은 되돌릴 수 없습니다 (복구 불가).\n\n` +
                    `확인을 위해 사용자명을 정확히 입력하세요:`
                );
                if (typed === null) return;
                if (typed.trim() !== user.username) {
                    addToast('사용자명이 일치하지 않습니다. 삭제를 취소했습니다.', 'error');
                    return;
                }
                try {
                    const response = await fetch(
                        `/api/admin/users/${user.id}`,
                        {
                            method: 'DELETE',
                            headers: { 'Authorization': `Bearer ${auth.token}` }
                        }
                    );
                    const data = await response.json().catch(() => ({}));
                    if (response.ok) {
                        // 행 자체를 목록에서 제거.
                        setUsers(users.filter(u => u.id !== user.id));
                        addToast(data.message || `${user.username} 계정을 삭제했습니다.`,
                                 'warning');
                    } else {
                        // self_deletion_forbidden / last_active_admin / delete_failed 등 노출
                        addToast(data.error || data.message || '삭제 실패', 'error');
                    }
                } catch (err) {
                    addToast('요청 중 오류 발생', 'error');
                }
            };

            if (loading) return <LoadingSpinner />;

            return (
                <div className="space-y-6">
                    <ToastContainer toasts={toasts} />
                    <h2 className="text-3xl font-bold">관리자 패널</h2>

                    {/* Tabs */}
                    <div className="flex gap-4 border-b border-slate-200">
                        <button
                            onClick={() => setTab('approvals')}
                            className={`py-3 px-4 font-semibold border-b-2 transition ${
                                tab === 'approvals'
                                    ? 'border-police-600 text-police-600'
                                    : 'border-transparent text-slate-600 hover:text-slate-700'
                            }`}
                        >
                            승인 대기 ({approvals.length})
                        </button>
                        <button
                            onClick={() => setTab('caseAssignments')}
                            className={`py-3 px-4 font-semibold border-b-2 transition ${
                                tab === 'caseAssignments'
                                    ? 'border-police-600 text-police-600'
                                    : 'border-transparent text-slate-600 hover:text-slate-700'
                            }`}
                            title="비담당 사건을 담당 사건으로 등록하는 요청"
                        >
                            담당 사건 등록 요청 ({caseAssignmentRequests.length})
                        </button>
                        <button
                            onClick={() => setTab('users')}
                            className={`py-3 px-4 font-semibold border-b-2 transition ${
                                tab === 'users'
                                    ? 'border-police-600 text-police-600'
                                    : 'border-transparent text-slate-600 hover:text-slate-700'
                            }`}
                        >
                            사용자 관리
                        </button>
                        <button
                            onClick={() => setTab('loginApprovals')}
                            className={`py-3 px-4 font-semibold border-b-2 transition ${
                                tab === 'loginApprovals'
                                    ? 'border-amber-500 text-amber-700'
                                    : 'border-transparent text-slate-600 hover:text-slate-700'
                            }`}
                            title="의심 계정 / 토큰 미보유 계정의 로그인 승인"
                        >
                            🔐 로그인 승인 {bgPending.length > 0 && (
                                <span className="ml-1 inline-block bg-amber-600 text-slate-900 text-xs px-2 py-0.5 rounded-full">
                                    {bgPending.length}
                                </span>
                            )}
                        </button>
                        <button
                            onClick={() => setTab('breakGlass')}
                            className={`py-3 px-4 font-semibold border-b-2 transition ${
                                tab === 'breakGlass'
                                    ? 'border-red-500 text-red-700'
                                    : 'border-transparent text-slate-600 hover:text-slate-700'
                            }`}
                            title="긴급 자가발동(Break-Glass) 사후 리뷰"
                        >
                            🚨 Break-Glass {brPending.length > 0 && (
                                <span className="ml-1 inline-block bg-red-600 text-white text-xs px-2 py-0.5 rounded-full">
                                    {brPending.length}
                                </span>
                            )}
                        </button>
                    </div>

                    {/* Approvals Tab */}
                    {tab === 'approvals' && (
                        <div className="space-y-4">
                            {approvals.length === 0 ? (
                                <div className="text-center text-slate-600 py-8">
                                    대기 중인 승인이 없습니다
                                </div>
                            ) : (
                                approvals.map(approval => (
                                    <div key={approval.id} className="glass-card p-6 rounded-lg">
                                        <div className="flex justify-between items-start mb-4">
                                            <div>
                                                <h4 className="text-lg font-bold">{approval.resource_title}</h4>
                                                <p className="text-sm text-slate-600">
                                                    {approval.requester_name} ({approval.requester_dept})
                                                    {approval.sensitivity_grade && (
                                                        <span className="ml-2 text-xs px-2 py-0.5 rounded bg-slate-50">
                                                            등급 {approval.sensitivity_grade}
                                                        </span>
                                                    )}
                                                </p>
                                            </div>
                                            <span className="text-sm text-slate-600">{approval.requested_at}</span>
                                        </div>
                                        <p className="text-sm text-slate-700 mb-4">{approval.reason}</p>
                                        <div className="bg-white/60 rounded p-3 text-xs text-slate-600 mb-3 leading-relaxed">
                                            <div className="font-semibold text-slate-700 mb-1">승인 옵션</div>
                                            <div>
                                                • <span className="text-green-700">열람 전용 승인</span> — 사용자는 일정 시간 동안 문서를 열람할 수 있지만
                                                <span className="font-semibold"> 다운로드는 불가</span>합니다. (기본)
                                            </div>
                                            <div>
                                                • <span className="text-police-700">다운로드 포함 승인</span> — 열람·다운로드 모두 허용합니다.
                                                사본이 단말로 반출되므로 꼭 필요한 경우에만 선택하세요.
                                            </div>
                                        </div>
                                        <div className="flex gap-2">
                                            <button
                                                onClick={() => handleApprove(approval.id, false)}
                                                className="flex-1 bg-green-600 hover:bg-green-700 text-white font-semibold py-2 rounded transition"
                                                title="열람만 허용. 다운로드는 차단됩니다."
                                            >
                                                열람 전용 승인
                                            </button>
                                            <button
                                                onClick={() => {
                                                    if (window.confirm(
                                                        '다운로드까지 허용하여 승인할까요?\n' +
                                                        '문서 사본이 사용자 단말로 반출됩니다.\n' +
                                                        '이 선택은 감사 로그에 기록됩니다.'
                                                    )) {
                                                        handleApprove(approval.id, true);
                                                    }
                                                }}
                                                className="flex-1 bg-police-600 hover:bg-police-700 text-white font-semibold py-2 rounded transition"
                                                title="열람 및 다운로드 모두 허용."
                                            >
                                                다운로드 포함 승인
                                            </button>
                                            <button
                                                onClick={() => handleReject(approval.id, '거부')}
                                                className="flex-1 bg-red-600 hover:bg-red-700 text-white font-semibold py-2 rounded transition"
                                            >
                                                거부
                                            </button>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    )}

                    {/* Case Assignment Requests Tab */}
                    {tab === 'caseAssignments' && (
                        <div className="space-y-4">
                            {caseAssignmentRequests.length === 0 ? (
                                <div className="text-center text-slate-600 py-8">
                                    대기 중인 담당 사건 등록 요청이 없습니다
                                </div>
                            ) : (
                                caseAssignmentRequests.map(req => {
                                    const statusLabel = {
                                        pending_admin: '관리자 검토 대기',
                                        otp_required: '요청자 OTP 인증 대기',
                                        otp_verified: 'OTP 인증 완료',
                                        approved: '승인 완료',
                                        rejected: '반려',
                                    }[req.status] || req.status;
                                    const statusCls = req.status === 'otp_verified'
                                        ? 'bg-green-50 text-green-800 border-green-200'
                                        : req.status === 'otp_required'
                                            ? 'bg-amber-50 text-amber-800 border-amber-200'
                                            : 'bg-slate-50 text-slate-700 border-slate-200';
                                    return (
                                        <div key={req.id} className="glass-card p-6 rounded-lg border border-slate-200">
                                            <div className="flex justify-between items-start gap-4 mb-4">
                                                <div>
                                                    <div className="flex items-center gap-2 mb-2">
                                                        <h4 className="text-lg font-bold">{req.resource_title}</h4>
                                                        <span className={`text-xs px-2 py-1 rounded border ${statusCls}`}>{statusLabel}</span>
                                                        {req.sensitivity_grade && (
                                                            <span className="text-xs px-2 py-1 rounded bg-slate-100 text-slate-700">
                                                                Grade {req.sensitivity_grade}
                                                            </span>
                                                        )}
                                                    </div>
                                                    <p className="text-sm text-slate-600">
                                                        사건번호: <span className="font-mono">{req.case_number}</span>
                                                        {' · '}담당 등록 요청자: <span className="font-semibold">{req.requester_name}</span>
                                                        {' '}({req.requester_username}, {req.requester_dept}, {req.requester_role})
                                                    </p>
                                                    <p className="text-sm text-slate-600 mt-1">
                                                        검토 대상 역할: {req.reviewer_role === 'deputy_admin' ? '부관리자' : '관리자'}
                                                    </p>
                                                </div>
                                                <span className="text-xs text-slate-500 whitespace-nowrap">{req.requested_at}</span>
                                            </div>

                                            <div className="bg-white/70 rounded p-3 text-sm text-slate-700 mb-4">
                                                <span className="font-semibold">요청 사유:</span> {req.reason || '사유 없음'}
                                            </div>

                                            <div className="flex flex-wrap gap-2">
                                                <button
                                                    onClick={() => handleCaseAssignmentRequireOtp(req.id)}
                                                    disabled={req.status !== 'pending_admin'}
                                                    className="px-4 py-2 rounded bg-amber-500 hover:bg-amber-600 text-slate-900 text-sm font-semibold transition disabled:opacity-40 disabled:cursor-not-allowed"
                                                >
                                                    요청자 OTP 인증 요구
                                                </button>
                                                <button
                                                    onClick={() => handleCaseAssignmentApprove(req.id)}
                                                    disabled={req.status !== 'otp_verified'}
                                                    className="px-4 py-2 rounded bg-green-600 hover:bg-green-700 text-white text-sm font-semibold transition disabled:opacity-40 disabled:cursor-not-allowed"
                                                >
                                                    최종 승인 / 담당 등록
                                                </button>
                                                <button
                                                    onClick={() => handleCaseAssignmentReject(req.id)}
                                                    className="px-4 py-2 rounded bg-red-600 hover:bg-red-700 text-white text-sm font-semibold transition"
                                                >
                                                    반려
                                                </button>
                                                <button
                                                    onClick={reloadCaseAssignments}
                                                    className="px-4 py-2 rounded bg-white border border-slate-300 text-slate-700 text-sm font-semibold hover:bg-slate-50 transition"
                                                >
                                                    새로고침
                                                </button>
                                            </div>
                                        </div>
                                    );
                                })
                            )}
                        </div>
                    )}

                    {/* Users Tab */}
                    {tab === 'users' && (
                        <div>
                            <div className="flex justify-between items-center mb-4">
                                <div className="text-xs text-slate-600">
                                    총 {users.length}명 · admin 계정은 UI에서 만들 수 없습니다(bootstrap 전용)
                                </div>
                                <button
                                    onClick={openCreateModal}
                                    className="bg-police-600 hover:bg-police-700 text-white text-sm font-semibold px-4 py-2 rounded transition"
                                >
                                    + 새 계정 추가
                                </button>
                            </div>
                            <div className="overflow-x-auto">
                            <table className="w-full text-sm">
                                <thead>
                                    <tr className="border-b border-slate-200">
                                        <th className="text-left py-3 px-4">사용자명</th>
                                        <th className="text-left py-3 px-4">이름</th>
                                        <th className="text-left py-3 px-4">역할</th>
                                        <th className="text-left py-3 px-4">신뢰</th>
                                        <th className="text-left py-3 px-4">허용 위치</th>
                                        <th className="text-left py-3 px-4">상태</th>
                                        <th className="text-left py-3 px-4">작업</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {users.map(user => {
                                        // 상태 우선순위: 비활성 > 잠금 > 활성
                                        // (비활성은 관리자 수동, 잠금은 failed_login 자동)
                                        const isSelf = user.id === auth.user?.id;
                                        let statusLabel, statusCls;
                                        if (!user.is_active) {
                                            statusLabel = '비활성';
                                            statusCls = 'bg-slate-50 text-slate-700';
                                        } else if (user.is_locked) {
                                            statusLabel = '잠금';
                                            statusCls = 'bg-red-50 text-red-800';
                                        } else {
                                            statusLabel = '활성';
                                            statusCls = 'bg-green-50 text-green-800';
                                        }
                                        return (
                                            <tr key={user.id} className="border-b border-slate-200">
                                                <td className="py-3 px-4 font-mono">
                                                    {user.username}
                                                    {isSelf && <span className="ml-2 text-[10px] text-police-700">(나)</span>}
                                                </td>
                                                <td className="py-3 px-4">{user.name}</td>
                                                <td className="py-3 px-4">
                                                    <span className="text-xs font-semibold capitalize">
                                                        {user.role}
                                                    </span>
                                                </td>
                                                <td className="py-3 px-4">
                                                    <div className="font-mono text-xs">
                                                        <span className={`font-semibold ${
                                                            Number(user.trust_score) < 50 ? 'text-red-600' :
                                                            Number(user.trust_score) < 70 ? 'text-amber-700' :
                                                            'text-green-700'
                                                        }`}>
                                                            {Number(user.trust_score || 0).toFixed(0)}
                                                        </span>
                                                        <span className="text-slate-400"> / 위반 </span>
                                                        <span className={Number(user.violation_count || 0) >= 3 ? 'text-red-600 font-semibold' : 'text-slate-700'}>
                                                            {Number(user.violation_count || 0)}
                                                        </span>
                                                    </div>
                                                </td>
                                                <td className="py-3 px-4">
                                                    <span className="text-xs text-slate-700">
                                                        {(user.allowed_locations || []).join(', ') || '—'}
                                                    </span>
                                                </td>
                                                <td className="py-3 px-4">
                                                    <span className={`px-3 py-1 rounded text-xs font-semibold ${statusCls}`}>
                                                        {statusLabel}
                                                    </span>
                                                </td>
                                                <td className="py-3 px-4">
                                                    <div className="flex items-center gap-3">
                                                        {user.is_locked && (
                                                            <button
                                                                onClick={() => handleUnlock(user.id)}
                                                                className="text-police-600 hover:text-police-700 text-xs font-semibold"
                                                            >
                                                                잠금 해제
                                                            </button>
                                                        )}
                                                        {/* #29 — 활성/비활성 무관하게 '삭제' 항상 노출.
                                                              이전 UI: 활성 행에 [비활성화][삭제], 비활성 행에 [활성화] 만 있어서
                                                              한 번 비활성화된 계정은 UI 로 완전삭제할 길이 없었고,
                                                              관리자가 '비활성화'를 '삭제'로 오인해 계정이 비활성 상태로 적체됨.
                                                              지금은 '삭제' 가 항상 일차 행동, '비활성화/활성화' 는 보조. */}
                                                        {(() => {
                                                            const editable = canEditLocations(user);
                                                            const reason = isSelf
                                                                ? '본인 계정은 본인이 수정할 수 없습니다'
                                                                : (editable
                                                                    ? '허용 위치 편집'
                                                                    : '권한 매트릭스상 이 대상은 수정할 수 없습니다');
                                                            return (
                                                                <button
                                                                    onClick={() => openLocModal(user)}
                                                                    disabled={!editable}
                                                                    title={reason}
                                                                    className="text-police-600 hover:text-police-700 disabled:text-gray-400 disabled:cursor-not-allowed text-xs font-semibold"
                                                                >
                                                                    위치 편집
                                                                </button>
                                                            );
                                                        })()}
                                                        <button
                                                            onClick={() => handleDeleteUser(user)}
                                                            disabled={isSelf}
                                                            title={isSelf ? '본인 계정은 삭제할 수 없습니다' : '계정 완전 삭제 (사용자/기기/세션 제거, 감사 로그는 보존). 복구 불가.'}
                                                            className="text-red-600 hover:text-red-700 disabled:text-gray-600 disabled:cursor-not-allowed text-xs font-semibold"
                                                        >
                                                            삭제
                                                        </button>
                                                        {user.is_active ? (
                                                            <button
                                                                onClick={() => handleToggleActive(user)}
                                                                disabled={isSelf}
                                                                title={isSelf ? '본인 계정은 비활성화할 수 없습니다' : '일시 비활성화 (계정/기기/감사 로그는 보존, 로그인만 차단). 보조 기능.'}
                                                                className="text-amber-600 hover:text-amber-700 disabled:text-gray-600 disabled:cursor-not-allowed text-xs font-semibold"
                                                            >
                                                                비활성화
                                                            </button>
                                                        ) : (
                                                            <button
                                                                onClick={() => handleToggleActive(user)}
                                                                className="text-green-600 hover:text-green-700 text-xs font-semibold"
                                                            >
                                                                활성화
                                                            </button>
                                                        )}
                                                    </div>
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                            </div>
                        </div>
                    )}

                    {/* 허용 위치 편집 모달 */}

                                                                    {a.resource_title && (
                                                                        <span className="ml-1 text-slate-700">({a.case_number} {a.resource_title})</span>

                                                                    {typeof a.sensitivity_grade !== 'undefined' && (

                                                            {a.scope === 'broad' && (

                                                            {a.activated_at} ~ {a.expires_at}

                                                    <div className="text-slate-500 text-xs mb-1">발동자 정당화 사유:</div>
                                                    {a.justification}

                                                <div className="flex gap-2">
                                                    <button

                                                    >
                                                        정당 (justified)
                                                    </button>
                                                    <button
                                                        onClick={() => handleBrReview(a.id, 'partial')}
                                                        className="flex-1 bg-amber-700 hover:bg-amber-600 text-white font-semibold py-2 rounded transition"
                                                    >
                                                        부분 (partial)
                                                    </button>
                                                    <button
                                                        onClick={() => handleBrReview(a.id, 'unjustified')}
                                                        className="flex-1 bg-red-700 hover:bg-red-600 text-white font-semibold py-2 rounded transition"
                                                    >
                                                        부당 (unjustified)
                                                    </button>
                                                </div>
                                            </div>
                                        ))}

                                )}
                            </div>

                            {/* 전체 이력 (활성 포함) */}
                            <div>
                                <h3 className="text-lg font-bold mb-3">📜 전체 Break-Glass 이력</h3>
                                {brHistory.length === 0 ? (
                                    <div className="text-center text-slate-600 py-6 bg-white/50 rounded">
                                        이력이 없습니다
                                    </div>
                                ) : (
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-sm">
                                            <thead>
                                                <tr className="border-b border-slate-200">
                                                    <th className="text-left py-2 px-3">발동 시각</th>
                                                    <th className="text-left py-2 px-3">발동자</th>
                                                    <th className="text-left py-2 px-3">scope</th>
                                                    <th className="text-left py-2 px-3">대상</th>
                                                    <th className="text-left py-2 px-3">상태</th>
                                                    <th className="text-left py-2 px-3">리뷰</th>
                                                    <th className="text-left py-2 px-3">액션</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {brHistory.map(a => (
                                                    <tr key={a.id} className="border-b border-slate-200">
                                                        <td className="py-2 px-3 font-mono text-xs text-slate-600">{a.activated_at}</td>
                                                        <td className="py-2 px-3">
                                                            <span className="font-mono text-slate-700">{a.activator_username}</span>
                                                            <span className="text-xs text-slate-500 ml-2">{a.activator_name}</span>
                                                        </td>
                                                        <td className="py-2 px-3 text-xs text-slate-700 font-mono">{a.scope}</td>
                                                        <td className="py-2 px-3 text-xs text-slate-700">
                                                            {a.scope === 'broad'
                                                                ? <span>Grade ≥ {a.min_grade}</span>
                                                                : (
                                                                    <span>
                                                                        {a.case_number || '#' + a.resource_id}
                                                                        {typeof a.sensitivity_grade !== 'undefined' && (
                                                                            <span className="ml-2 text-[10px] px-1.5 py-0.5 rounded bg-slate-50">
                                                                                G{a.sensitivity_grade}
                                                                            </span>
                                                                        )}
                                                                    </span>
                                                                )}
                                                        </td>
                                                        <td className="py-2 px-3">
                                                            <span className={`px-2 py-0.5 rounded text-xs font-semibold ${
                                                                a.status === 'active'                ? 'bg-red-50 text-red-800' :
                                                                a.status === 'expired'               ? 'bg-white text-slate-700' :
                                                                a.status === 'revoked'               ? 'bg-orange-50 text-orange-700' :
                                                                a.status === 'released'              ? 'bg-white text-slate-800' :
                                                                a.status === 'reviewed_justified'    ? 'bg-green-50 text-green-800' :
                                                                a.status === 'reviewed_partial'      ? 'bg-amber-50 text-amber-800' :
                                                                a.status === 'reviewed_unjustified'  ? 'bg-red-50 text-red-700' :
                                                                                                       'bg-white text-slate-700'
                                                            }`}>
                                                                {a.status}
                                                            </span>
                                                        </td>
                                                        <td className="py-2 px-3 text-xs text-slate-700">
                                                            {a.review_verdict
                                                                ? <span>{a.review_verdict}{a.reviewer_username && ` / ${a.reviewer_username}`}</span>
                                                                : <span className="text-slate-500">-</span>}
                                                        </td>
                                                        <td className="py-2 px-3">
                                                            {a.status === 'active' && (
                                                                <button
                                                                    onClick={() => handleBrRevoke(a.id)}
                                                                    className="text-orange-400 hover:text-orange-700 text-xs font-semibold"
                                                                >
                                                                    강제 종료
                                                                </button>
